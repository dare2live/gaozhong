# 音频资源配置 — Phase 7.2 听力模块
# 命名规范: data/audio/{year}/listening/{id}.mp3
# id 格式: {section}_{question_number}  (eg: short_01, dialog_05, passage_01)
#
# 高考英语听力结构 (新课标 II 卷):
#   Section A: 5 短对话 (各 1 题, 5 分)
#   Section B: 4 长对话/独白 (各 2-3 题, 15 分)
#   Section C: 1 填空题 (5 空, 10 分) — 2021 起部分年份调整
#   满分 30 分, 占总分 150 的 20%

version: "1.0"
updated: "2026-05-25"

directory_layout:
  root: "data/audio"
  pattern: "{year}/listening/{id}.mp3"
  example: "2024/listening/short_01.mp3"

sections:
  short_dialog:
    prefix: "short"
    description: "Section A 短对话 — 5 段, 每段 1 题"
    count: 5
    questions_per: 1
    points_per: 1
    total_points: 5

  long_dialog:
    prefix: "dialog"
    description: "Section B 长对话 — 2 段, 每段 3-4 题"
    count: 2
    questions_per: 3
    points_per: 1.5
    total_points: 9

  monologue:
    prefix: "passage"
    description: "Section B 独白 — 2 段, 每段 3-4 题"
    count: 2
    questions_per: 3
    points_per: 1.5
    total_points: 9

  dictation:
    prefix: "dict"
    description: "Section C 听力填空 (部分年份)"
    count: 1
    questions_per: 5
    points_per: 1.4
    total_points: 7

scoring:
  total_points: 30
  total_weight_percent: 20
  play_count: 2

tts_fallback:
  enabled: true
  engine: "macos_say"
  voice: "Samantha"
  rate: 160
  note: "当无原始音频时, macOS say 命令合成备用音频"

years_covered:
  - 2021
  - 2022
  - 2023
  - 2024
  - 2025
