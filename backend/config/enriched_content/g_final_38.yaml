segments:
  hook: |
    **Hanfu: When Ancient Fashion Meets Modern Life**

    Walk through any major city in China today and you will see something that would have been absolutely unthinkable ten years ago: young people wearing traditional Chinese clothing on the street. This is the Hanfu movement — a cultural trend that has adapted ancient fashion for modern life.

    Grammar fill-in-the-blank tests love this kind of topic. A passage about culture gives the examiner a chance to test verb tenses, word forms, and connectors all in one text. Today, you will learn how to adapt your grammar knowledge to this question type.

    **Quick warm-up — fill in the blank:**
    - Young people have ___ (absolute) fallen in love with traditional clothing.
    答案: absolutely (副词修饰动词 fallen)

  core: |
    **语法填空题型精讲**

    ---

    **题型特征** (新课标 II 卷):
    - 一篇 200-250 词短文, 10 个空
    - 有提示词空 (给出词根, 需变形): 6-7 个
    - 无提示词空 (纯语法填空): 3-4 个

    ---

    **有提示词 — 6 种变形** ⭐⭐⭐

    | 给什么 | 考什么 | 判断方法 |
    |---|---|---|
    | 动词原形 | 时态/语态/非谓语 | 有无主语? 有 → 谓语(时态); 无 → 非谓语(doing/done/to do) |
    | 名词 | 单复数 / 所有格 | 前面有 many/few/these → 复数; 后面的名词属于它 → 's |
    | 形容词 | 副词 / 比较级 / 最高级 | 修饰动词 → 副词; than → 比较级; the → 最高级 |
    | 副词 | 形容词 | 修饰名词 → 改形容词 (absolute → absolutely 反过来也考) |

    ---

    **无提示词 — 4 大类** ⭐⭐⭐

    | 考什么 | 常见答案 | 判断方法 |
    |---|---|---|
    | 冠词 | a/an/the | 名词前无限定词 → 加冠词 |
    | 介词 | in/on/at/of/with/by/for | 固定搭配 (adapt to / be interested in) |
    | 连词/关系词 | that/which/who/where/when/because/although | 两个句子之间缺连接 |
    | 代词 | it/its/them/themselves | 指代前面的名词 |

    ---

    **核心词**:

    **adapt** /əˈdæpt/ v. 适应; 改编 ⭐⭐
    - adapt to + 环境/变化 (适应)
    - adapt from + 原著 (改编)
    - adapt sth for + 目的 (改造以适用)

    例句:
    1. It takes time to adapt to a new school. ⭐
    2. The novel was adapted for the screen. ⭐⭐
    3. Young designers have adapted traditional Hanfu patterns for modern fashion, making them absolutely popular among students. ⭐⭐⭐

    语法填空考法: adapt → adapted (过去式/过去分词) / adapting (现在分词) / adaptation (名词)

    **absolutely** /ˈæbsəluːtli/ adv. 完全地; 绝对地 ⭐⭐
    - absolutely + 形容词 (absolutely beautiful/necessary/right)
    - 口语: Absolutely! (当然!)
    - 语法填空: absolute → absolutely (形容词→副词)

  relations: |
    **语法填空的知识点覆盖**

    语法填空综合考查所有语法:
    - 时态语态 → #33 虚拟语气 + 一般/进行/完成
    - 从句连接词 → #14-#16 (G2 三种从句) + #23 (G3 主语从句)
    - 非谓语动词 → #24 (G3 非谓语综合)
    - 词形变化 → 本节重点

    **adapt vs adopt vs adjust 终极对比**:
    | 词 | 变 | 不变 |
    |---|---|---|
    | adapt | 改变自己去适应 | 环境不变 |
    | adopt | 采纳别人的东西 | 东西不变 |
    | adjust | 微调细节 | 大方向不变 |

    语法填空中: adapt to 出现最多 (适应新环境是高频话题)

  practice: |
    **Practice Grammar Fill: Hanfu Revival** ⭐⭐⭐

    (模拟新课标 II 卷语法填空, 200 词, 10 空)

    In recent years, a cultural trend ___(1)___ (know) as the Hanfu movement has become ___(2)___ (absolute) popular among Chinese youth. Hanfu, the traditional clothing of the Han people, ___(3)___ (wear) for thousands of years before ___(4)___ (give) way to Western fashion in the early 20th century.

    Today, young designers are ___(5)___ (adapt) these ancient styles for modern life. They use traditional patterns ___(6)___ add modern cuts and materials. The result is clothing that feels both old and new.

    Social media has played ___(7)___ important role in this trend. Millions of photos are shared online, ___(8)___ (inspire) more people to try Hanfu. For many young people, wearing Hanfu is not just about fashion — it is about connecting ___(9)___ their cultural roots.

    The movement has also ___(10)___ (affect) the business world. Hanfu shops have appeared in every major city.

    答案:
    1. known (过去分词做后置定语: a trend known as...)
    2. absolutely (副词修饰形容词 popular)
    3. was worn (被动语态: 衣服"被穿"; 过去时)
    4. giving (动名词: before giving way = 在让步之前)
    5. adapting (现在进行时: are adapting)
    6. but (连词: 转折 — 用传统图案"但"加现代剪裁)
    7. an (冠词: play an important role 固定搭配)
    8. inspiring (现在分词做结果状语)
    9. with (介词: connect with 与...连接)
    10. affected (现在完成时: has affected)

  summary: |
    **本节核心要点:**

    1. **有提示词**: 判断"谓语 or 非谓语" → 再定时态/形式
    2. **无提示词**: 四类 (冠词/介词/连词/代词), 看前后语法缺什么
    3. **adapt**: 适应/改编 (adapt to/from/for); 区分 adopt/adjust
    4. **absolutely**: absolute → absolutely (形→副, 高频变形)
    5. **做题节奏**: 200 词 + 10 空 = 8 分钟 (先有提示词, 再无提示词)

