segments:
  hook: |
    **The 25-Point Question That Changes Everything**

    Narrative continuation (读后续写) is worth 25 points — the single highest-scoring question on the entire gaokao. It asks you to read an incomplete story and write two paragraphs (about 150 words total) to continue it.

    This is where ALL your English skills come together: vocabulary, grammar, reading comprehension, and creative writing. Students who master this one question type often see their total score jump by 10-15 points.

    Today you will learn the method, the language tools, and the mindset for writing a strong continuation.

  core: |
    **续写 完全讲解**

    ---

    **一、续写六步法** ⭐⭐⭐

    1. **读原文** (5 min): 理解人物 + 情节 + 情感
    2. **看首句**: 每段首句已给 → 决定情节方向
    3. **列提纲** (2 min): 每段 3-4 个情节点
    4. **写作** (15 min): 每段 70-80 词
    5. **加分细节**: 环境 + 心理 + 动作
    6. **检查** (3 min): 时态一致 + 人称一致

    ---

    **二、情绪转折 — 续写核心技巧** ⭐⭐⭐

    几乎所有续写都包含"情绪转折": 从负面到正面, 或从困境到突破.

    常见模式:
    - 害怕/绝望 → 鼓起勇气 → 成功
    - 误解/冲突 → 真相 → 和解
    - 失败 → 反思 → 重新尝试

    **情绪词库**:

    | 负面 | 转折 | 正面 |
    |---|---|---|
    | frightened, anxious, desperate | suddenly, to one's astonishment | relieved, overjoyed, grateful |
    | abandoned hope, heart sank | at that moment, it occurred to... | burst into tears of joy |
    | overwhelmed, confused | gathered courage, took a deep breath | a sense of achievement |

    ---

    **三、加分句型** ⭐⭐⭐

    **动作描写**: 避免 "She was happy" → 用动作表现
    - Her eyes lit up with joy.
    - He clenched his fists and took a deep breath.
    - Tears rolled down her cheeks.

    **环境描写**: 烘托情绪
    - The sun broke through the clouds. (希望)
    - Silence fell over the room. (紧张)
    - A gentle wind brushed her face. (平静)

    **倒装句** (连接 G_FINAL #34):
    - **Never** had she felt so alive.
    - **Not until** that moment **did** he realize the truth.
    - **So** moved **was** she that tears filled her eyes.

    ---

    **核心词在续写中的用法**:
    - **abandon**: She had almost abandoned hope when... (绝望的低谷)
    - **astonish**: To her astonishment, ... (转折的惊喜)

  relations: |
    **续写综合运用所有技能**

    - 词汇: G1-G3 全部核心词 (情绪/动作/描写)
    - 语法: 从句 (#14-#16, #23), 非谓语 (#24), 倒装 (G_FINAL #34)
    - 阅读: 理解原文 (#9-#10, #17, #25-#26)
    - 写作: 应用文 (#20, #29) 的格式感 → 续写的文学感

    续写 = G1-G3 所有知识的最终考验

  practice: |
    **练习: 续写片段** ⭐⭐⭐

    原文摘要: Li Wei 在考古工地实习, 发现了一块可能很重要的石头, 但没人相信他.

    给定首句: **Holding the stone tightly, Li Wei decided to approach Professor Zhang.**

    请写 70-80 词续写 (包含: 1 个环境描写 + 1 个心理描写 + 1 个倒装句)

    参考:
    ---
    Holding the stone tightly, Li Wei decided to approach Professor Zhang. The afternoon sun cast long shadows across the dig site as he walked toward the tent. His heart was beating fast — never before had he felt so nervous. "Professor, I think I found something important," he said, his voice trembling. Professor Zhang looked up, took the stone, and examined it carefully. To Li Wei's astonishment, the professor's eyes widened. "Do you know what this is?" she asked. "This could change everything we know about this site."
    ---

    **自评检查**:
    - [ ] 时态一致 (过去时)
    - [ ] 有环境描写 (sun/shadows)
    - [ ] 有心理描写 (heart beating/nervous)
    - [ ] 有倒装 (Never before had he...)
    - [ ] 用了情绪转折 (nervous → astonishment)

  summary: |
    **本节 (G3 最后一课) 核心要点:**

    1. **续写六步法**: 读→看首句→列提纲→写→加细节→检查
    2. **情绪转折**: 从负面→正面 (abandon hope → astonishment)
    3. **动作代替形容词**: "Eyes lit up" > "She was happy"
    4. **倒装加分**: Never/Not until/So + 倒装 = 文学效果
    5. **25 分策略**: 15 分写两段 (每段 70-80 词) + 3 分检查

