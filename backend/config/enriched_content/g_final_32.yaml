segments:
  hook: |
    **The Clone Debate: Science at a Crossroads**

    In 2023, researchers in China successfully cloned a monkey for the first time — not for food or medicine, but for scientific research. The news caused both excitement and anger among the public. From one angle, cloning technology could help us understand diseases better. From another angle, it raises difficult questions about nature and ethics.

    The administration of several countries has already set rules about cloning. But as science moves faster than law, the debate continues: should humans clone animals freely? What about human cells?

    **Comprehension Check:**
    1. Why did the cloning news cause anger among some people?
    2. What has the administration of some countries done about cloning?
    3. From which two angles does the passage discuss cloning?

  core: |
    **核心词汇精讲 (5 词)**

    ---

    **1. clone** /kləʊn/ n./v. 克隆; 复制 ⭐⭐⭐
    [G_FINAL·课标·选必]

    用法:
    - n. a clone of sth (某物的克隆体)
    - v. clone an animal/cell (克隆动物/细胞)
    - 引申: 完全相同的副本 (a clone of his father = 和他父亲一模一样)

    例句:
    1. Scientists cloned the first sheep in 1996. ⭐
    2. The debate about whether to clone human cells has caused public anger. ⭐⭐
    3. From a scientific angle, cloning offers hope for medicine, but the administration must consider its risks to society. ⭐⭐⭐

    易错点: clone 既可做名词也可做动词, 注意语境判断词性.

    ---

    **2. canal** /kəˈnæl/ n. 运河; 管道 ⭐⭐
    [G_FINAL·课标·选必]

    用法:
    - the Panama/Suez Canal (巴拿马/苏伊士运河)
    - 引申: 体内管道 (ear canal = 耳道)

    例句:
    1. The Grand Canal in China is over 1,700 kilometers long. ⭐
    2. Building a canal requires careful planning from the administration. ⭐⭐
    3. From the angle of history, canals changed trade; from the angle of science, they show how humans reshape nature. ⭐⭐⭐

    易错点: canal (人工水道) vs channel (自然水道/频道); canal 强调人工建造.

    ---

    **3. anger** /ˈæŋɡə/ n./v. 愤怒; 激怒 ⭐⭐
    [G_FINAL·课标·选必]

    用法:
    - n. in anger (愤怒地), with anger (带着愤怒)
    - v. sth angers sb (某事激怒某人)
    - adj. angry (at/about/with)

    例句:
    1. He could not hide his anger at the decision. ⭐
    2. The news about illegal cloning angered many citizens. ⭐⭐
    3. Rather than acting in anger, the administration chose to study the issue from every angle before making new rules. ⭐⭐⭐

    易错点: angry at/about + 事情; angry with + 人. anger 名词不可数.
    词族: anger → angry → angrily

    ---

    **4. angle** /ˈæŋɡl/ n. 角度; 观点 ⭐⭐
    [G_FINAL·课标·选必]

    用法:
    - 数学: at an angle of 45 degrees (45度角)
    - 观点: from the angle of / from a different angle
    - 搭配: look at sth from every angle

    例句:
    1. The bridge was built at a perfect angle. ⭐
    2. Let us look at this problem from a different angle. ⭐⭐
    3. The administration examined the cloning debate from multiple angles — scientific, ethical, and economic — before expressing its official position. ⭐⭐⭐

    易错点: angle (物理角度/观点) vs angel (天使) — 拼写仅差一个字母!

    ---

    **5. administration** /ədˌmɪnɪˈstreɪʃn/ n. 管理; 行政机构; 政府 ⭐⭐⭐
    [G_FINAL·课标·选必]

    用法:
    - the school/hospital administration (学校/医院管理层)
    - government administration (政府行政)
    - 动词形式: administer (管理/执行)

    例句:
    1. The school administration decided to allow the science project. ⭐
    2. Good administration requires looking at problems from multiple angles. ⭐⭐
    3. The new administration promised to control anger in public debate by creating fair rules for scientific research including cloning. ⭐⭐⭐

    易错点: administration 是长词, 注意重音在第四音节 (-ˈstreɪ-).
    词族: administer → administration → administrative → administrator

  relations: |
    **为什么这 5 个词一起学?**

    这组词构成"科技治理"语义场:

    - **clone** (技术行为) → 引发 **anger** (公众情绪)
    - **anger** → 需要 **administration** (管理机构) 介入
    - **administration** → 从多个 **angle** (角度) 分析
    - **canal** 看似不相关, 但: 人工改造自然 (canal) 与人工改造生命 (clone) 是同一类伦理讨论

    **高考出题角度**:
    - 阅读 C/D 篇: "科技伦理"主题长文 (clone + anger + debate)
    - 语法填空: administration 的词形变化 (administer/administrative)
    - 完形: angle 的"观点"义项 (高频考点, 不考"角度"义)

  practice: |
    **场景 1: 学校辩论 (School Debate)** ⭐⭐

    Our school administration organized a debate about gene technology. From one angle, students argued that cloning could save endangered animals. From another angle, some expressed anger at the idea of "playing God." The discussion helped everyone see the issue from new angles.

    Q1: What did the school administration organize?
    A. A science experiment  B. A debate about gene technology  C. A trip to a lab  D. A writing competition
    答案: B

    Q2: 用 anger 的形容词形式填空: Some students were ___ about the idea of cloning.
    答案: angry

    ---

    **场景 2: 新闻评论 (News Commentary)** ⭐⭐

    The government administration announced new rules on cloning research. Scientists must now report their work from the beginning. This decision came after public anger over secret experiments. "We need to see this from the angle of safety," said the official.

    Q3: Why did the administration make new rules?
    A. To save money  B. Because of public anger  C. To build a canal  D. To clone more animals
    答案: B

    Q4: angle 在文中的意思是 ___. A. 角度(数学) B. 观点/视角 C. 三角形 D. 方向
    答案: B

    ---

    **场景 3: 历史与科技对比** ⭐⭐⭐

    Throughout history, great projects have caused both pride and anger. When the Suez Canal was built, some praised the engineering while others questioned the human cost. Today, cloning technology creates a similar divide. The angle of progress says "move forward"; the angle of caution says "slow down." Every administration must balance these views.

    Q5: What does the passage compare cloning to?
    A. Building a canal  B. School debates  C. Government rules  D. Public anger
    答案: A (历史工程项目与现代克隆技术的对比)

    Q6: 将 administer 变为名词: The ___ must make fair decisions about science.
    答案: administration

  summary: |
    **本节核心要点:**

    1. **clone** — 动词/名词双用, 克隆/复制
    2. **canal** — 人工水道 (vs channel 自然), 隐喻"人工改造"
    3. **anger** — 不可数名词; angry at/about 事, angry with 人
    4. **angle** — "观点"义是高考高频 (from the angle of); 注意不要拼成 angel!
    5. **administration** — 长词记忆: admin + istr + ation; 词族 4 个

    **语义网络**: clone (技术) → anger (反应) → administration (管理) → angle (视角) → canal (类比)

