    **Practice Passage: Mars Soil Analysis** ⭐⭐⭐

    (模拟新课标 II 卷 C 篇, 320 词)

    Scientists at NASA have been studying soil samples collected by the Perseverance rover on Mars. The academic team, led by Dr. Sarah Chen, found that certain minerals in the soil can absorb and store water molecules. This discovery suggests that ancient Mars may have had conditions suitable for simple life forms.

    The research focused on a region called Jezero Crater, which scientists believe was once a lake. "The minerals we found are similar to those on Earth that form in the presence of water," Dr. Chen explained. "What surprised us was how much water the soil could absorb — far more than we expected."

    However, not all scientists agree with these findings. Some argue that the minerals could have formed through other processes that did not require water. This academic debate is likely to continue until more samples are returned to Earth for direct study.

    The practical value of this research goes beyond academic interest. If Mars soil can indeed absorb water, future human missions could potentially extract water directly from the ground. This would greatly reduce the cost of sending water from Earth.

    **Q1.** What did Dr. Chen's team discover about Mars soil?
    A. It contains living organisms.
    B. It can absorb and store water molecules.
    C. It is exactly the same as Earth soil.
    D. It was recently formed by rainfall.
    答案: B (P1 "certain minerals...can absorb and store water molecules")

    **Q2.** Why is Jezero Crater important for this research?
    A. It has the most minerals on Mars.
    B. It is the closest area to the rover.
    C. Scientists think it was once a lake.
    D. It has the highest temperature on Mars.
    答案: C (P2 "which scientists believe was once a lake")

    **Q3.** What does the underlined word "extract" in the last paragraph most likely mean?
    A. Take out  B. Put in  C. Give up  D. Break down
    答案: A (语境: 从地面"取出"水, 与 absorb 相反)

    **Q4.** What can we infer from the passage?
    A. All scientists support Dr. Chen's findings.
    B. Mars definitely had life in the past.
    C. The academic debate about Mars water is not yet settled.
    D. Humans will travel to Mars within five years.
    答案: C (P3 "This academic debate is likely to continue")

