  hook: |
    **How to Read a 350-Word Science Passage in 6 Minutes**

    On the gaokao, you will face four reading passages. Passage C or D is usually a science article — about technology, space, medicine, or the environment. These passages test your ability to absorb complex information quickly.

    Today we will practice with real exam-style science texts. The goal: read a 350-word passage, answer 4 questions, and finish in 6-7 minutes. This is the academic standard required for a high score.

    **Before we start, three golden rules:**
    1. Read the questions FIRST — know what you are looking for
    2. Find the topic sentence of each paragraph (usually the first or last sentence)
    3. Do not try to understand every word — focus on the main idea and key details

  core: |
    **阅读策略精讲 + 核心词**

    ---

    **策略 1: 段落结构识别** ⭐⭐

    科技长文的典型结构:
    - P1: 现象引入 (A recent study found that...)
    - P2: 研究过程 (Researchers examined... The team collected...)
    - P3: 结果发现 (The results showed... Surprisingly,...)
    - P4: 意义/展望 (This discovery could lead to... However,...)

    每段的主题句通常在段首. 先读段首 → 建立全文框架 → 再看题目定位.

    ---

    **策略 2: 长难句拆分** ⭐⭐⭐

    科技文的难句特征: 多层定语 + 被动 + 插入语

    例句拆分示范:
    原句: "The data collected by the spacecraft, which had been **absorb**ing radiation measurements for three years, suggested that the surface conditions were more extreme than scientists had previously believed."

    拆分:
    - 主干: The data **suggested** that the surface conditions were more extreme.
    - 修饰1: collected by the spacecraft (过去分词修饰 data)
    - 修饰2: which had been absorbing... (定语从句修饰 spacecraft)
    - 比较: more extreme than... previously believed

    ---

    **核心词**:

    **academic** /ˌækəˈdemɪk/ adj. 学术的; 学业的 ⭐⭐
    - academic research / academic paper / academic performance
    - 例: This passage is written in an academic style, with data and references.
    - 易错: academic ≠ theoretical (academic 强调"学校/学术领域", theoretical 强调"理论的")

    **absorb** /əbˈzɔːb/ v. 吸收; 全神贯注 ⭐⭐
    - absorb water/heat/radiation (物理吸收)
    - absorb information/knowledge (理解吸收)
    - be absorbed in sth (全神贯注于)
    - 例: She was so absorbed in the article that she forgot about lunch.
    - 词族: absorb → absorption → absorbent → absorbing (引人入胜的)

