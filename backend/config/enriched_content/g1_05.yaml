segments:
  hook: |
    **An Afternoon at the Movies**

    Last Saturday afternoon, our English club organized a movie event. We watched a film set in Africa, about an actor and actress who traveled across the continent to help build schools. One student was absent — she was sick at home. But she watched it online later and said, "I wish I had been there. The story was amazing."

    Movies are one of the best ways to learn English naturally. You hear real conversations, see real emotions, and learn about places like Africa without leaving your classroom. Today we will practice vocabulary about people, places, and time.

  core: |
    **核心词汇精讲**

    ---

    **1. actor** /ˈæktə/ n. 男演员; 行动者 ⭐
    [G1·外研·必修1]
    - a movie/film actor (电影演员)
    - 引申: a key actor in the project (项目中的关键人物)
    - 词族: act → actor (男) → actress (女) → acting (演技)

    ---

    **2. actress** /ˈæktrəs/ n. 女演员 ⭐
    [G1·外研·必修1]
    - 注意: 现代英语中, actor 可指男女演员; actress 特指女性
    - She is a famous actress. = She is a famous actor. (两种说法都对)

    ---

    **3. Africa** /ˈæfrɪkə/ n. 非洲 ⭐
    [G1·外研·必修1]
    - African (adj./n. 非洲的/非洲人)
    - South Africa (南非)
    - 地理常识: 世界第二大洲, 54 个国家

    例句:
    1. Africa is known for its wildlife and natural beauty. ⭐
    2. The actress traveled to Africa to support education projects. ⭐⭐

    ---

    **4. afternoon** /ˌɑːftəˈnuːn/ n. 下午 ⭐
    [G1·外研·必修1]
    - in the afternoon (在下午)
    - this/tomorrow/yesterday afternoon (不加 in)
    - Good afternoon! (下午好)

    注意时间表达: in the morning/afternoon/evening, at night (例外!)

    ---

    **5. absent** 复习 (详见 #3): be absent from; absence (n.)

    **综合例句** (5 词全用):
    The actress who was supposed to visit our school on Friday afternoon was absent due to filming in Africa. An actor from the same movie came instead, and he told us fascinating stories about the people he met there.

  relations: |
    **词汇分类: 人物 + 地点 + 时间**

    | 类别 | 本节词 | 扩展 |
    |---|---|---|
    | 人物 | actor, actress | teacher, student, scientist |
    | 地点 | Africa | Asia, Europe, America |
    | 时间 | afternoon | morning, evening, night |
    | 状态 | absent | present, available |

    act 词族完整链: act (v.) → action (n.) → active (adj.) → activity (n.) → actor/actress (n.)

  practice: |
    **场景 1: 看图说话** ⭐

    描述一张图: A group of students are watching a movie in the classroom on a Friday afternoon.

    用至少 3 个本节词造句:
    示例: On Friday ___(1)___, our class watched a movie about ___(2)___. The main ___(3)___ in the film was very talented. Only Tom was ___(4)___ because he was feeling unwell.

    1. afternoon  2. Africa  3. actor/actress  4. absent

    **场景 2: 词形变化** ⭐⭐

    5. He wants to be an ___ (act) when he grows up. → actor
    6. Her ___ (absent) from class worried the teacher. → absence
    7. The ___ (Africa) wildlife is famous around the world. → African

  summary: |
    **本节核心要点:**

    1. **actor/actress**: act 词族; 现代英语 actor 可通用
    2. **Africa**: African (adj./n.); 高考地理话题常见
    3. **afternoon**: in the afternoon; 但 this afternoon 无 in
    4. **absent** 复习: be absent from; absence

