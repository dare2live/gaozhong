    **Practice Passage: Primate Social Learning** ⭐⭐⭐

    (模拟新课标 II 卷 D 篇, 300 词)

    A team of researchers in Japan spent three years studying how young monkeys learn from adults. Their findings suggest that social learning in primates is more complex than previously thought.

    The team observed that baby monkeys did not simply copy what adults did. Instead, they adjusted their own behavior based on whether the adult's action led to a positive result. For example, when an adult monkey found food by turning over a rock, the baby would try the same action. But if the adult failed, the baby would try a different approach.

    "This shows that young primates do not just imitate," said lead researcher Dr. Tanaka. "They make accurate judgments about which behaviors are worth copying." The finding challenges the old belief that animal learning is purely mechanical.

    However, the study also revealed limits. When the task became too complex, young monkeys stopped adjusting and simply copied the adult exactly — even when the adult's method was not the most efficient. This suggests that social learning has both strengths and weaknesses.

    **Q1.** What is the main finding of the research?
    A. Baby monkeys always copy adults exactly.
    B. Young monkeys adjust their learning based on results.
    C. Primates cannot learn from each other.
    D. Adult monkeys are better learners than young ones.
    答案: B (P2 核心: "adjusted their own behavior based on whether the adult's action led to a positive result")

    **Q2.** What can we infer from Dr. Tanaka's words?
    A. Animal learning is purely mechanical.
    B. Primates are smarter than all other animals.
    C. Young monkeys can evaluate the effectiveness of actions.
    D. Only Japanese researchers study primate behavior.
    答案: C (推理: "make accurate judgments about which behaviors are worth copying" → 能评估行为效果)

    **Q3.** When tasks became too complex, young monkeys ___.
    A. gave up completely  B. copied adults without adjusting  C. found better methods  D. asked for help
    答案: B (P4: "simply copied the adult exactly")

    **Q4.** The word "approach" in paragraph 2 is closest in meaning to ___.
    A. opinion  B. method  C. distance  D. speed
    答案: B (语境: 尝试不同的方法)

