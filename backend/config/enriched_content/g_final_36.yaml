    **阅读策略 + 核心词 (自然/生物类)**

    ---

    **策略: 推理判断题解法** ⭐⭐⭐

    推理判断题标志词: infer, imply, suggest, conclude, learn from

    解题三步:
    1. 定位: 题目关键词 → 找原文对应段
    2. 理解: 原文说了什么 (字面意思)
    3. 推进一步: 原文没直接说, 但可以合理推出 (不能过度推理)

    **过度推理 vs 合理推理**:
    - 原文: "Monkeys threw food when treated unfairly."
    - 合理推理: Monkeys can notice differences in treatment. ✅
    - 过度推理: Monkeys have the same moral system as humans. ❌

    ---

    **核心词**:

    **adjust** /əˈdʒʌst/ v. 调整; 适应 ⭐⭐
    - adjust sth (调整某物): adjust the temperature / adjust the plan
    - adjust to sth (适应某事): adjust to a new environment
    - 注意: adjust 强调"微调", 不是彻底改变

    例句:
    1. The scientist adjusted the camera to get a more accurate picture. ⭐
    2. It took the monkeys several weeks to adjust to the new environment. ⭐⭐
    3. Researchers constantly adjust their methods to ensure that their observations are accurate and fair. ⭐⭐⭐

    易错: adjust to (适应) vs adapt to (适应). 两者相似, 但 adjust 偏"微调", adapt 偏"改变自身".
    词族: adjust → adjustment → adjustable

    ---

    **accurate** /ˈækjərət/ adj. 准确的; 精确的 ⭐⭐
    - accurate data / accurate description / accurate measurement
    - 反义: inaccurate

    例句:
    1. Is this report accurate? ⭐
    2. It is difficult to get accurate results when studying animal behavior. ⭐⭐
    3. Scientists must adjust their tools regularly to keep measurements accurate, especially when studying creatures in the wild rather than in a lab. ⭐⭐⭐

    易错: accurate (事实/数据准确) vs precise (精确到小数点) vs correct (对/错判断).
    词族: accurate → accuracy → accurately → inaccurate

