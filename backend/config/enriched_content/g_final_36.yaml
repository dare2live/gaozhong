  hook: |
    **Do Monkeys Have a Sense of Fairness?**

    In a famous experiment, two monkeys were placed side by side. Both completed the same task. One received a grape; the other received a cucumber. The monkey who got the cucumber threw it back at the researcher in anger.

    This experiment changed how scientists think about animal behavior. It suggested that even monkeys can tell when something is unfair. But is this interpretation accurate? And how do researchers adjust their methods to study animal minds more carefully?

    **Think about it:**
    1. Why did the monkey throw the cucumber?
    2. Do you think animals can understand fairness? Why or why not?
    3. What might "adjust their methods" mean in scientific research?

