segments:
  hook: |
    **Acting on Your Dreams**

    A young girl from a small town looked across the river every morning and thought about the city on the other side. After years of hard work, she finally got a chance to act on her dream — she won a competition to study abroad. Her parents did not agree at first. "It's too far," they said. But after seeing her determination, they agreed to let her go.

    Today's words are about movement, action, and agreement. They are among the most common words in English, but each one has hidden meanings that the exam loves to test.

  core: |
    **核心词汇精讲**

    ---

    **1. across** /əˈkrɒs/ prep./adv. 穿过; 对面 ⭐
    [G1·外研·必修1]

    用法:
    - walk/run/swim across (穿过: 从一边到另一边)
    - across from (在...对面) = opposite
    - across the country/world (全国/全球范围)
    - come across (偶然遇到) ← 高考高频!

    例句:
    1. She walked across the street carefully. ⭐
    2. The library is across from the school gate. ⭐⭐
    3. While reading, I came across a new word and decided to act on my teacher's advice — I looked it up immediately. ⭐⭐⭐

    辨析: across (平面穿过: 过河/过街) vs through (立体穿过: 穿过森林/隧道)

    ---

    **2. act** /ækt/ v. 行动; 表演; 起作用 n. 行为; 法案 ⭐
    [G1·外研·必修1]

    动词多义:
    - act on sth (依据某事行动: act on advice = 按建议做)
    - act as (充当: act as a guide = 充当导游)
    - act out (表演出来)

    名词:
    - an act of kindness (善举)
    - in the act of (正在做...的时候)

    例句:
    1. Think before you act. ⭐
    2. She acted as a translator for the foreign teacher. ⭐⭐
    3. The students agreed to act on the plan and walked across the campus to set up the English corner. ⭐⭐⭐

    词族: act → action → active → activity → actor → actress

    ---

    **3. after** /ˈɑːftə/ prep./conj./adv. 在...之后 ⭐
    [G1·外研·必修1]

    基础但有高级用法:
    - after all (毕竟)
    - after doing sth (做完某事之后) ← 非谓语!
    - name after (以...命名)
    - look after (照顾)
    - one after another (一个接一个)

    例句:
    1. After lunch, we went to the library. ⭐
    2. After thinking about it carefully, he agreed to the plan. ⭐⭐
    3. After walking across the entire city and acting as volunteers for the whole day, the students were tired but happy. ⭐⭐⭐

    语法点: "after doing" 是非谓语 (动名词做时间状语); "after + 从句" 是时间状语从句

    ---

    **4. agree** /əˈɡriː/ v. 同意; 一致 ⭐
    [G1·外研·必修1]

    搭配 (超重要):
    - agree with sb (同意某人观点)
    - agree to sth/do sth (同意某提议/同意做)
    - agree on sth (就某事达成一致)
    - 区分: agree with (人/观点) vs agree to (计划/提议) vs agree on (具体事项)

    例句:
    1. I agree with you completely. ⭐
    2. They agreed to act on the teacher's suggestion. ⭐⭐
    3. After a long discussion, all the students agreed on a plan to help classmates who had difficulty learning across different subjects. ⭐⭐⭐

    词族: agree → agreement → disagree → disagreement

  relations: |
    **词汇联想: 行动链**

    across (方向) → act (行动) → after (时间顺序) → agree (达成共识)

    **搭配速记卡**:
    - come **across** (偶遇); **across** from (对面)
    - **act** on (依据行动); **act** as (充当)
    - **after** all (毕竟); **after** doing (做完后)
    - **agree** with (人); **agree** to (提议); **agree** on (事项)

  practice: |
    **场景 1: 日记** ⭐

    Today ___(1)___ school, I walked ___(2)___ the park and met my friend. We ___(3)___ to study together this weekend. She said she would ___(4)___ as my English partner.

    1. after  2. across  3. agreed  4. act

    **场景 2: 搭配辨析** ⭐⭐

    5. I don't agree ___ his opinion. (with/to/on)  → 答案: with
    6. They agreed ___ the date for the meeting. (with/to/on) → 答案: on
    7. She agreed ___ help us. (with/to/on) → 答案: to
    8. I came ___ an interesting book in the library. (across/after/against) → 答案: across

  summary: |
    **本节核心要点:**

    1. **across**: 平面穿过 (vs through 立体); come across 偶遇
    2. **act**: 行动/表演/充当; act on (依据); 词族 6 个
    3. **after**: after doing (非谓语); after all (毕竟)
    4. **agree**: with 人, to 提议, on 事项 — 三个介词必须区分!

