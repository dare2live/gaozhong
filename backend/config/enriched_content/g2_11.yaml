segments:
  hook: |
    **The Young Scientist Who Changed Her City**

    At the age of 19, Li Wei had already achieved something most adults had not. She developed a low-cost water filter for rural schools. "Actually, the idea came from my own experience," she explained in an interview. "I grew up in a small village where the water was not clean."

    Her account of the project impressed many people. She acquired new skills along the way — not just in science, but in communication and leadership. Her achievement proved that age does not limit what you can do.

    **Think about it:**
    1. What was Li Wei's achievement?
    2. What skills did she acquire during the project?
    3. What does "account of the project" mean here?

  core: |
    **核心词汇精讲**

    ---

    **1. achievement** /əˈtʃiːvmənt/ n. 成就; 达成 ⭐⭐
    [G2·外研·必修3·U1·Vocabulary]

    用法:
    - a great/major achievement (重大成就)
    - a sense of achievement (成就感)
    - academic achievement (学业成绩)

    例句:
    1. Winning the prize was a great achievement for the team. ⭐
    2. Her academic achievements helped her get into a top university. ⭐⭐
    3. The accurate record of their achievements inspired other students to acquire new skills and take action. ⭐⭐⭐

    词族: achieve (v.) → achievement (n.) → achiever (n. 成功者)

    ---

    **2. account** /əˈkaʊnt/ n. 账户; 描述; 原因 v. 解释 ⭐⭐
    [G2·外研·必修3·U2]

    多义词 (高考爱考):
    - n. bank account (银行账户)
    - n. give an account of (描述/叙述)
    - v. account for (解释原因; 占比)
    - on account of (由于) = because of
    - take...into account (考虑到)

    例句:
    1. She opened a bank account last week. ⭐
    2. He gave a detailed account of what happened. ⭐⭐
    3. Education accounts for a large part of the government budget, which actually helps more students acquire the skills they need. ⭐⭐⭐

    易错: account for 两义 — (1) 解释原因 (2) 占比例

    ---

    **3. acquire** /əˈkwaɪə/ v. 获得; 习得 ⭐⭐
    [G2·外研·必修3·U3]

    用法:
    - acquire knowledge/skills/experience (获得知识/技能/经验)
    - acquire a habit/taste (养成习惯/品味)
    - 比 get 正式, 比 obtain 常用

    例句:
    1. She acquired a lot of experience during the project. ⭐
    2. Children acquire language naturally by listening to others. ⭐⭐
    3. To achieve accurate results in research, scientists must first acquire a deep understanding of their subject. ⭐⭐⭐

    辨析: acquire (逐渐获得, 强调过程) vs obtain (获得, 强调结果) vs gain (获得, 中性)

    ---

    **4. actually** /ˈæktʃuəli/ adv. 实际上; 事实上 ⭐⭐
    [G2·外研·必修3·U1]

    用法:
    - Actually, ... (句首, 转折/纠正)
    - actually + 动词 (实际上做了)
    - not actually (其实并没有)

    例句:
    1. Actually, I don't agree with you. ⭐
    2. She looks young, but she is actually 30 years old. ⭐⭐
    3. Many people think success comes from talent, but it actually comes from hard work and the ability to acquire new skills over time. ⭐⭐⭐

    易错: actually ≠ "现在" (中文"实际"有时暗示"当前"); actually 的英文义只是"事实上"

    ---

    **5. accurate** /ˈækjərət/ adj. 准确的 ⭐⭐
    [G2·外研·必修3·U2]

    (复习 #36 G_FINAL 已详讲, 此处 G2 初次引入)

    搭配: accurate data / description / information / measurement
    反义: inaccurate
    辨析: accurate (数据准) vs correct (对错判断) vs exact (精确到细节)

  relations: |
    **G2 词汇与 G1 的衔接**

    G1 学了 achieve (动词) → G2 扩展到 achievement (名词)
    G1 学了 accept → G2 深入到 account (更正式的表达)

    这 5 个词的学术场景:
    - **论文写作**: accurate data + achievement + account for results
    - **面试对话**: acquire experience + actually + achievement
    - **新闻报道**: give an account of + accurate + achieve

  practice: |
    **场景 1: 学术报告** ⭐⭐

    The research team spent two years studying water quality. They ___(1)___ (acquire) new testing methods and ___(2)___ (actual) found that the water was not as clean as people thought. Their ___(3)___ (achieve) was publishing an ___(4)___ (accurate) report.

    1. acquired  2. actually  3. achievement  4. accurate

    **场景 2: account 多义辨析** ⭐⭐⭐

    5. Please give us a detailed ___ of the event. (account/achievement)
    答案: account (描述)

    6. Homework ___ for 30% of the final grade. (accounts/achieves)
    答案: accounts (account for = 占比)

    7. We must take the weather into ___ when planning. (account/action)
    答案: account (take into account = 考虑到)

  summary: |
    **本节核心要点:**

    1. **achievement**: n. 成就 (achieve 的名词形式, G1→G2 拓展)
    2. **account**: 三义 (账户/描述/解释); account for 两用 (原因+比例)
    3. **acquire**: 逐渐获得 (比 get 正式); acquire knowledge/skills
    4. **actually**: 事实上 (≠"现在"); 句首表转折
    5. **accurate**: 准确的 (vs correct vs exact)

    **下节预告**: #12 科技与创新 (admire/aim/aspect) — 描述目标和多面性
