segments:
  hook: |
    **Studying Abroad: Exciting or Frightening?**

    Every year, thousands of Chinese students go abroad to study. Some feel excited about the adventure. Others feel afraid of living alone in a foreign country. There are clear advantages — better language skills, wider experience, new friends. But there are also challenges.

    One student shared her story: "When I first arrived, I was absent from class for a whole week because I was too afraid to speak English. But I learned not to fight against my fear. Instead, I used it as motivation."

    Today's words help you describe feelings, positions, and choices. They appear frequently in reading passages about school life, study abroad, and personal growth.

    **Think about it:**
    1. Would you like to study abroad? Why or why not?
    2. What are the advantages of learning English well?
    3. Have you ever been afraid to try something new?

  core: |
    **核心词汇精讲**

    ---

    **1. afraid** /əˈfreɪd/ adj. 害怕的; 恐怕 ⭐
    [G1·外研·必修1·U1]

    用法:
    - be afraid of sth/doing (害怕某事/做某事)
    - be afraid to do (不敢做) — 强调"因害怕而不做"
    - I'm afraid (that)... (恐怕...) — 礼貌地说坏消息

    例句:
    1. Don't be afraid of making mistakes. ⭐
    2. She was afraid to ask questions in class. ⭐⭐
    3. I'm afraid I cannot accept your invitation because I will be abroad next week. ⭐⭐⭐

    辨析: afraid of doing (担心会发生) vs afraid to do (因害怕而不敢做)
    - afraid of falling (担心掉下去) vs afraid to jump (不敢跳)

    ---

    **2. against** /əˈɡenst/ prep. 反对; 靠着; 对抗 ⭐
    [G1·外研·必修1·U2]

    多义:
    - 反对: be against sth (反对某事) / vote against (投反对票)
    - 对抗: fight against / compete against / play against
    - 靠着: lean against the wall (靠着墙)
    - 对比: against a dark background (以黑色为背景)

    例句:
    1. Are you for or against the plan? ⭐
    2. Our team played against the best school in the city. ⭐⭐
    3. Going abroad has many advantages, but some parents are against it because they are afraid their children are too young to live alone. ⭐⭐⭐

    ---

    **3. advantage** /ədˈvɑːntɪdʒ/ n. 优势; 好处 ⭐
    [G1·外研·必修1·U3]

    用法:
    - have an advantage over sb (比某人有优势)
    - take advantage of (利用)
    - advantages and disadvantages (优缺点)

    例句:
    1. Being tall is an advantage in basketball. ⭐
    2. One advantage of studying abroad is meeting people from different countries. ⭐⭐
    3. Students who are not afraid to speak English have a clear advantage over those who are absent from class discussions. ⭐⭐⭐

    反义词: disadvantage (劣势)

    ---

    **4. abroad** /əˈbrɔːd/ adv. 到/在国外 ⭐
    [G1·外研·必修1·U3]

    用法:
    - go/travel/study abroad (出国/旅行/留学)
    - live abroad (在国外生活)
    - from abroad (从国外)
    - 注意: abroad 是副词, 前面不加 to! (不说 go to abroad)

    例句:
    1. She went abroad to study last year. ⭐
    2. Living abroad gives you the advantage of learning a new culture. ⭐⭐
    3. Many students are afraid of going abroad, but those who do often find that the advantages far outweigh the challenges. ⭐⭐⭐

    超级易错: go abroad (不是 go to abroad); at home and abroad (国内外)

    ---

    **5. absent** /ˈæbsənt/ adj. 缺席的; 不在的 ⭐
    [G1·外研·必修1·U2]

    用法:
    - be absent from school/class/work (缺课/缺勤)
    - absent-minded (心不在焉的)

    例句:
    1. He was absent from school today. ⭐
    2. If you are often absent from class, you will lose the advantage of daily practice. ⭐⭐
    3. The student who had been absent for a week returned, no longer afraid to participate in the discussion against her classmates. ⭐⭐⭐

    词族: absent → absence (n. 缺席) — in the absence of (在缺乏...的情况下)

  relations: |
    **语义网络: 情绪+立场+选择**

    afraid (情绪) → 影响 → against (立场: 反对出国)
                              或 → advantage (看到好处: 支持出国)
    abroad (行动: 真的去了) → absent (结果: 离开了原来的地方)

    **搭配速记**:
    - be **afraid** of/to
    - be **against** sth / fight **against**
    - have an **advantage** over / take **advantage** of
    - go **abroad** (无 to!)
    - be **absent** from

  practice: |
    **场景 1: 班会讨论** ⭐

    Topic: Should high school students study abroad?

    Fill in the blanks:
    1. Some students are ___ (afraid) of living alone in a foreign country.
    2. Others believe going ___ (abroad) has many ___ (advantage).
    3. A few parents are ___ (against) the idea because their children are too young.

    答案: 1. afraid  2. abroad, advantages  3. against

    ---

    **场景 2: 完形练习** ⭐⭐

    Li Wei was often ___(4)___ from English class. He was ___(5)___ of speaking in front of others. One day, his teacher said, "Don't fight ___(6)___ your fear. Use it." Li Wei decided to take ___(7)___ of every chance to practice. Six months later, he won the school English speech contest.

    4. A. abroad  B. absent  C. afraid  D. against
    答案: B (absent from class)

    5. A. abroad  B. absent  C. afraid  D. against
    答案: C (afraid of speaking)

    6. A. abroad  B. absent  C. afraid  D. against
    答案: D (fight against fear)

    7. A. action  B. advantage  C. advice  D. address
    答案: B (take advantage of)

  summary: |
    **本节核心要点:**

    1. **afraid**: of doing (担心发生) vs to do (不敢做); I'm afraid (恐怕)
    2. **against**: 三义 (反对/对抗/靠着); for or against
    3. **advantage**: take advantage of (利用); have an advantage over
    4. **abroad**: 副词! go abroad (无 to); at home and abroad
    5. **absent**: be absent from; absence (n.)

