segments:
  hook: |
    **A New Beginning: Your First Day in High School**

    Welcome to high school! You have worked hard to get here, and now a new chapter begins. In the next three years, you will develop many new abilities — not just in English, but in every subject.

    Being able to express yourself in English is one of the most valuable skills you can achieve. It opens doors to different ideas, different people, and different futures. But first, you need to accept a simple truth: learning a language takes time, and making mistakes is part of the process.

    Let's start with four words that describe your journey: ability, able, accept, and achieve. These are words you will use every day — in class, in writing, and on the exam.

    **Quick questions:**
    1. What new abilities do you hope to develop in high school?
    2. Is it easy or hard to accept your own mistakes?
    3. What is one thing you want to achieve this year?

  core: |
    **核心词汇精讲**

    ---

    **1. ability** /əˈbɪləti/ n. 能力 ⭐
    [G1·外研·必修1·U1·Vocabulary]

    用法:
    - have the ability to do sth (有做某事的能力)
    - ability in sth (在某方面的能力)
    - 复数: abilities (多种能力)

    例句:
    1. She has the ability to speak three languages. ⭐
    2. The test is designed to measure students' reading ability. ⭐⭐
    3. With hard work, everyone is able to develop new abilities and achieve their goals. ⭐⭐⭐

    易错点: ability 后用 to do (不用 of doing).
    词族: ability → able → unable → disable → disability

    ---

    **2. able** /ˈeɪbl/ adj. 有能力的 ⭐
    [G1·外研·必修1·U1]

    用法:
    - be able to do sth (能够做某事) = can
    - 比 can 更灵活: 有各种时态 (was able to / will be able to / have been able to)

    例句:
    1. He is able to finish the homework on time. ⭐
    2. After months of practice, she was finally able to play the song. ⭐⭐
    3. If you accept the challenge and keep trying, you will be able to achieve things you never thought possible. ⭐⭐⭐

    重点辨析: can vs be able to
    - can: 一般能力 (I can swim.)
    - be able to: 具体成功做到 (After trying many times, I was able to climb the mountain.)
    - 过去式: could 表"过去有能力"; was able to 表"过去成功做到了"

    ---

    **3. accept** /əkˈsept/ v. 接受; 认可 ⭐
    [G1·外研·必修1·U1]

    用法:
    - accept an invitation / an offer / a gift (接受邀请/提议/礼物)
    - accept that... (接受某个事实)
    - accept sb as... (接受某人为...)

    例句:
    1. Please accept my thanks. ⭐
    2. She accepted the fact that learning English takes time. ⭐⭐
    3. A good student is someone who is able to accept criticism and use it to achieve progress. ⭐⭐⭐

    易错辨析: accept (主动接受, 心里同意) vs receive (被动收到, 不管愿不愿意)
    - I received the letter but did not accept the offer. (收到了信, 但没接受那个提议)

    ---

    **4. achieve** /əˈtʃiːv/ v. 实现; 达到 ⭐
    [G1·外研·必修1·U1]

    用法:
    - achieve a goal / success / progress (实现目标/成功/进步)
    - achieve good results (取得好成绩)

    例句:
    1. He achieved his dream of becoming a teacher. ⭐
    2. To achieve success, you need both ability and hard work. ⭐⭐
    3. Students who are able to accept challenges and learn from failure will achieve more than those who only do what is easy. ⭐⭐⭐

    词族: achieve → achievement (n. 成就) → achievable (adj. 可实现的)
    搭配: a great/major achievement; a sense of achievement (成就感)

  relations: |
    **为什么这 4 个词一起学?**

    它们讲述了一个完整的学习故事:

    ability (你有潜力) → able (你能够做到) → accept (接受挑战/接受反馈) → achieve (最终达成目标)

    **词根联系**:
    - ability 和 able 同根 (拉丁语 habilis = 能够的)
    - 反义链: able → unable → disable → disability (从"能"到"不能")

    **高考考法**:
    - 语法填空: able → ability / unable / disability (词形变化)
    - 完形: accept vs receive (辨析)
    - 阅读: achieve + goal/success (高频搭配)

  practice: |
    **场景 1: 新生入学** ⭐

    Li Ming just started high school. On the first day, the teacher said, "I believe every student has the ___(1)___ to learn English well." Li Ming felt nervous, but he decided to ___(2)___ the challenge.

    1. A. ability  B. accept  C. achieve  D. able
    答案: A (have the ability to = 有能力)

    2. A. ability  B. accept  C. achieve  D. able
    答案: B (accept the challenge = 接受挑战)

    ---

    **场景 2: 课堂对话** ⭐⭐

    Teacher: Can you read this passage?
    Student: I'm not sure if I'm ___(3)___ to understand all the words.
    Teacher: That's OK. If you ___(4)___ that you don't know everything yet, you will learn faster.

    3. A. ability  B. accept  C. able  D. achieve
    答案: C (be able to do = 能够做)

    4. A. accept  B. achieve  C. able  D. ability
    答案: A (accept that... = 接受某个事实)

    ---

    **场景 3: 写作练习** ⭐⭐

    用 4 个核心词各写一个句子:
    5. ability: ___________________________________
    6. able: ___________________________________
    7. accept: ___________________________________
    8. achieve: ___________________________________
    (参考: 用自己的经历, 写关于学习英语的句子)

  summary: |
    **本节核心要点:**

    1. **ability**: n. 能力 — have the ability to do (不用 of doing)
    2. **able**: adj. — be able to (比 can 灵活, 有各种时态)
    3. **accept**: v. 接受 — accept vs receive (主动 vs 被动)
    4. **achieve**: v. 实现 — achieve a goal/success; n. achievement

    **学习故事**: ability (有潜力) → able (能做到) → accept (接受挑战) → achieve (达成目标)

    **下节预告**: #2 基础动作+描述 (action/add/address/advice) — 扩展日常表达能力
