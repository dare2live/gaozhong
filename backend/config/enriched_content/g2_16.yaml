  practice: |
    **练习 1: 选连接词** ⭐⭐

    1. ___ it was raining, we still went out. (Because/Although/When)
    答案: Although (让步: 虽然下雨, 仍然出去)

    2. I will call you ___ I arrive. (when/because/although)
    答案: when (时间: 到了就打)

    3. He studied hard ___ he wanted to pass the exam. (when/because/although)
    答案: because (原因)

    **练习 2: 改错** ⭐⭐⭐

    4. Although he is poor, but he is happy. → 去掉 but (although 和 but 不能连用)
    5. If it will rain tomorrow, I will stay home. → If it rains (主将从现)
    6. When I will finish, I will call you. → When I finish (主将从现)

    **练习 3: so...that vs such...that** ⭐⭐

    7. It was ___ a difficult question ___ nobody could answer it. (so/such...that)
    答案: such...that (such + a + 名词)

    8. He ran ___ fast ___ nobody could catch him. (so/such...that)
    答案: so...that (so + 副词)

  summary: |
    **本节核心要点:**

    1. **九种状语从句**: 时间/原因/让步/条件/目的/结果/方式/地点/比较
    2. **主将从现**: 时间/条件从句用一般现在时表将来
    3. **although ≠ although...but**: 不能连用!
    4. **so + 形副 + that / such + 名词 + that**
    5. **when (时间点) vs while (持续) vs as (同时/随着)**

