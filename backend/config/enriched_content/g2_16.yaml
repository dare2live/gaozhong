segments:
  hook: |
    **When, Because, Although: The Three Glue Words**

    "**When** I was a child, I wanted to be an astronaut." (时间)
    "I studied hard **because** I wanted to succeed." (原因)
    "**Although** the exam was difficult, I did not give up." (让步)

    These three words connect ideas and show the relationship between them. They are the third type of clause you need to master — after object clauses (#14) and relative clauses (#15). Together, these three types cover almost every complex sentence on the gaokao.

  core: |
    **状语从句 完全讲解**

    ---

    **一、九种状语从句** ⭐⭐

    | 类型 | 连接词 | 例句 |
    |---|---|---|
    | 时间 | when/while/as/before/after/until/since | **When** I arrived, she had left. |
    | 原因 | because/since/as/now that | I stayed home **because** it rained. |
    | 让步 | although/though/even though/while | **Although** he is young, he is very able. |
    | 条件 | if/unless/as long as/provided that | **If** you work hard, you will succeed. |
    | 目的 | so that/in order that | She spoke slowly **so that** we could understand. |
    | 结果 | so...that/such...that | He was **so** tired **that** he fell asleep. |
    | 方式 | as/as if/as though | Do **as** I told you. |
    | 地点 | where/wherever | Sit **wherever** you like. |
    | 比较 | as...as/not so...as/than | She runs **as fast as** her brother. |

    ---

    **二、时间状语从句重点** ⭐⭐⭐

    **when vs while vs as**:
    - when: 时间点 (when I arrived = 我到的那一刻)
    - while: 持续动作 (while I was sleeping = 我睡觉期间)
    - as: 同时/随着 (as time goes by = 随着时间过去)

    **"主将从现"规则**: 时间/条件从句中, 用一般现在时表将来!
    - When he **comes** (不用 will come), I will tell him.
    - If it **rains** (不用 will rain) tomorrow, we will stay home.

    ---

    **三、让步从句重点** ⭐⭐⭐

    although / though / even though 都表"虽然", 但:
    - 不能和 but 连用! (中文"虽然...但是", 英文只用一个)
      ✅ Although he is young, he is able.
      ✅ He is young, but he is able.
      ❌ ~~Although he is young, but he is able.~~

    ---

    **四、结果状语从句** ⭐⭐

    **so...that vs such...that**:
    - **so** + adj/adv + **that**: He was **so** tired **that** he fell asleep.
    - **such** + (a/an) + n + **that**: It was **such** a good book **that** I read it twice.

    口诀: so 后跟"形副", such 后跟"名词"

