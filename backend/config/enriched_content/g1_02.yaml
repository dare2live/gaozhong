segments:
  hook: |
    **Small Actions, Big Changes**

    A student once asked her teacher for advice: "How can I improve my English quickly?" The teacher smiled and said, "There is no shortcut. But I can add one suggestion — take action every single day. Even small actions matter."

    This is true for language learning. You cannot afford to wait until the exam to start preparing. The best time to start is now. Address your weaknesses early, and success will follow.

    Today we will learn five words that help you describe what people DO and how they communicate: action, add, address, advice, and afford.

    **Think about it:**
    1. What small actions do you take every day to learn English?
    2. Who do you go to for advice about studying?
    3. What does "you cannot afford to wait" mean?

  core: |
    **核心词汇精讲**

    ---

    **1. action** /ˈækʃn/ n. 行动; 行为 ⭐
    [G1·外研·必修1·U2]

    用法:
    - take action (采取行动) — 最重要的搭配!
    - put...into action (付诸行动)
    - in action (在运作中)
    - action movie (动作片)

    例句:
    1. It is time to take action. ⭐
    2. Good advice is useless if you do not put it into action. ⭐⭐
    3. The school took immediate action to address the problem after receiving the students' advice. ⭐⭐⭐

    易错: take action (不加 an/the); 但 "a kind action" (一个善举) 可数
    词族: action → act → active → actively → activity

    ---

    **2. add** /æd/ v. 加; 增加; 补充说 ⭐
    [G1·外研·必修1·U2]

    用法:
    - add A to B (把 A 加到 B 里)
    - add that... (补充说...)
    - add up (加起来)
    - add up to (总计达)

    例句:
    1. Please add your name to the list. ⭐
    2. "And don't forget to practice speaking," she added. ⭐⭐
    3. The teacher added that taking small actions every day would add up to great progress by the end of the year. ⭐⭐⭐

    易错: add 做"补充说"时, 后面可接 that 从句 (= say in addition)

    ---

    **3. address** /əˈdres/ n. 地址 v. 解决; 演讲; 称呼 ⭐⭐
    [G1·外研·必修1·U3]

    多义词! 高考最爱考动词义:
    - n. 地址 / 演讲 (deliver an address)
    - v. address a problem (解决/处理问题) ← 高考高频!
    - v. address sb (称呼某人; 对某人讲话)

    例句:
    1. What is your home address? ⭐
    2. We need to address this problem as soon as possible. ⭐⭐
    3. The principal addressed the students in the hall, offering advice on how to take action against exam pressure. ⭐⭐⭐

    易错: address a problem = solve/deal with a problem (不是"给问题一个地址")

    ---

    **4. advice** /ədˈvaɪs/ n. 建议; 忠告 ⭐
    [G1·外研·必修1·U1]

    用法:
    - give/offer advice (给建议)
    - take/follow advice (采纳建议)
    - a piece of advice (一条建议) — 不可数!
    - ask for advice (请教)

    例句:
    1. Thank you for your advice. ⭐
    2. She gave me some useful advice on how to study effectively. ⭐⭐
    3. The best advice I can offer is this: take action now, address your weak points, and add new words to your vocabulary every day. ⭐⭐⭐

    超级易错: advice 不可数! 不说 an advice / advices
    动词形式: advise (sb to do sth) — 注意拼写不同 (c→s)

    ---

    **5. afford** /əˈfɔːd/ v. 负担得起; 承受得起 ⭐
    [G1·外研·必修1·U3]

    用法:
    - can/cannot afford sth (买得起/买不起)
    - can/cannot afford to do sth (承担得起/承担不起做某事)
    - 常与 can't/couldn't 连用

    例句:
    1. They cannot afford a new computer. ⭐
    2. You can't afford to miss any classes before the exam. ⭐⭐
    3. Students who cannot afford private lessons can still achieve good results by taking action on their teacher's advice. ⭐⭐⭐

    易错: afford 几乎总和 can/could 一起用; 很少单独出现

  relations: |
    **5 词语义网络**

    这组词描述了"解决问题的过程":
    - 发现问题 → address it (面对/解决)
    - 寻求帮助 → ask for advice (请教)
    - 得到建议 → take action (采取行动)
    - 行动积累 → add up to progress (积少成多)
    - 时间成本 → can't afford to waste (不能浪费)

    **核心搭配记忆卡**:
    - take **action** (采取行动)
    - **add** ... to (把...加到)
    - **address** a problem (解决问题)
    - a piece of **advice** (一条建议)
    - can't **afford** to (承担不起)

  practice: |
    **场景 1: 师生对话** ⭐

    Student: I need some ___(1)___ on improving my English.
    Teacher: My suggestion is to take ___(2)___ every day.
    Student: What kind of action?
    Teacher: ___(3)___ 10 new words to your notebook each week, and practice using them.

    1. 答案: advice (不可数: some advice)
    2. 答案: action (take action 固定搭配)
    3. 答案: Add (add A to B)

    ---

    **场景 2: 学校通知** ⭐⭐

    Our school will ___(4)___ the problem of too much homework. The principal plans to ___(5)___ (address) all teachers next Monday and offer advice on better teaching methods. Students who cannot ___(6)___ (afford) extra study materials can borrow books from the library.

    4. 答案: address (address a problem = 解决问题)
    5. 答案: address (address sb = 对某人讲话)
    6. 答案: afford (cannot afford sth)

    ---

    **场景 3: 词形变化** ⭐⭐

    7. She is an ___(act) girl who loves sports. → 答案: active
    8. My teacher ___(advice) me to read more English books. → 答案: advised (注意拼写 c→s)
    9. The prices of these goods have been ___(add) up recently. → 答案: adding (现在完成进行时)

  summary: |
    **本节核心要点:**

    1. **action**: take action (采取行动); 不加冠词
    2. **add**: add A to B; add that...(补充说); add up to (总计)
    3. **address**: 动词义"解决/演讲" 是高考重点 (不只是"地址")
    4. **advice**: 不可数! a piece of advice; 动词 advise (拼写不同)
    5. **afford**: 几乎总与 can/can't 连用; afford to do

    **下节预告**: #3 感官与情绪 (afraid/against/advantage/abroad) — 描述感受和立场
