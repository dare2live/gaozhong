segments:
  hook: |
    **The Inventor Everyone Admires**

    Zhang Lei was just an ordinary adult working in a factory. But he had an aim: to build a robot that could help elderly people at home. Many people admired his dream, though some adults around him did not believe it was possible. "I admit it was difficult," he said, "but every great adventure starts with a single step."

    After three years of work, his robot was tested in 50 homes. The adventure was worth it.

    **Think about it:**
    1. What was Zhang Lei's aim?
    2. Why did people admire him?
    3. What did he admit about the process?

  core: |
    **核心词汇精讲**

    ---

    **1. admire** /ədˈmaɪə/ v. 钦佩; 欣赏 ⭐⭐
    [G2·外研·必修3·U3]

    用法:
    - admire sb for sth (因某事钦佩某人)
    - admire sth (欣赏某物: admire the view)

    例句:
    1. I really admire her courage. ⭐
    2. Everyone admires him for his achievements in science. ⭐⭐
    3. Adults and young people alike admire those who aim high and admit their mistakes honestly. ⭐⭐⭐

    词族: admire → admiration (n.) → admirable (adj.)
    辨析: admire (高度欣赏) vs respect (尊重) vs appreciate (感激/理解价值)

    ---

    **2. admit** /ədˈmɪt/ v. 承认; 准许进入 ⭐⭐
    [G2·外研·必修3·U2]

    用法:
    - admit doing sth (承认做了某事) — 不用 to do!
    - admit that... (承认...)
    - be admitted to/into (被录取/准入)

    例句:
    1. He admitted making a mistake. ⭐
    2. She was admitted to a top university. ⭐⭐
    3. The adult researcher admitted that the aim of the experiment had not been fully achieved, but he still admired his team's effort. ⭐⭐⭐

    易错: admit doing (不说 admit to do); be admitted to (被录取)

    ---

    **3. adult** /ˈædʌlt/ n./adj. 成年人; 成人的 ⭐
    [G2·外研·必修3·U1]

    用法: adult education / adult life / as an adult
    注意发音: 重音在第一音节 /ˈæd-/ (不是 /əˈdʌlt/)

    ---

    **4. adventure** /ədˈventʃə/ n. 冒险; 奇遇 ⭐⭐
    [G2·外研·必修3·U4]

    用法:
    - go on an adventure (去冒险)
    - adventure story/film (冒险故事/电影)
    - a sense of adventure (冒险精神)

    词族: adventure → adventurous (adj. 爱冒险的) → adventurer (n.)

    ---

    **5. aim** /eɪm/ n./v. 目标; 瞄准 ⭐⭐
    [G2·外研·必修3·U2]

    用法:
    - aim to do sth (目标是做某事)
    - aim at sth/doing (针对/瞄准)
    - with the aim of (以...为目的)
    - achieve one's aim (实现目标)

    例句:
    1. His aim is to become a doctor. ⭐
    2. The program aims to help adults learn new skills. ⭐⭐
    3. She aimed to complete the adventure within a month, and everyone admired her when she admitted it was harder than expected but still succeeded. ⭐⭐⭐

    辨析: aim (具体目标) vs goal (较大目标) vs purpose (目的/意图) vs target (指标/靶)

  relations: |
    **词汇语义场: 目标+评价**

    aim (设定目标) → adventure (过程中的挑战) → admit (承认困难) → admire (获得他人欣赏)
    adult 贯穿: 成人世界的目标/冒险/承认/欣赏

    **高考搭配记忆**:
    - admire sb **for** sth
    - admit **doing** (不是 to do!)
    - be admitted **to** university
    - aim **to do** / aim **at** doing
    - with the **aim** of

  practice: |
    **场景 1: 完形选词** ⭐⭐

    Zhang Wei is an ___(1)___ who has always ___(2)___ scientists. His ___(3)___ was to build something useful. He ___(4)___ that the process was full of difficulties, but this ___(5)___ taught him a lot.

    1. A. admire B. adult C. aim D. adventure → B (adult = 成年人)
    2. A. admired B. admitted C. aimed D. adventured → A (admired = 钦佩)
    3. A. adult B. admire C. aim D. adventure → C (aim = 目标)
    4. A. admired B. admitted C. aimed D. adventured → B (admitted = 承认)
    5. A. adult B. admire C. aim D. adventure → D (adventure = 冒险经历)

    **场景 2: 搭配填空** ⭐⭐

    6. I admire her ___ her hard work. (for/to/at) → for
    7. He admitted ___ (make) a mistake. → making
    8. She was admitted ___ the best university. (to/for/at) → to
    9. We aim ___ (finish) the project by Friday. → to finish

  summary: |
    **本节核心要点:**

    1. **admire**: 钦佩/欣赏; admire sb for sth
    2. **admit**: 承认 + doing (不是 to do!); be admitted to (被录取)
    3. **adult**: 成年人 (重音第一音节)
    4. **adventure**: 冒险; adventurous (爱冒险的)
    5. **aim**: 目标; aim to do / aim at doing / with the aim of

