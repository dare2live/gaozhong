segments:
  hook: |
    **From Despair to Hope: A Story of Change**

    Ten years ago, the lake near our village was almost dead. People had abandoned hope of saving it. But one teacher advocated for change. She adopted a new method — planting special grass along the shore. The results astonished everyone. Today, the lake is alive with fish and birds. The story altered how the whole village thought about the environment.

    These five words describe powerful emotions and turning points — exactly what you need for the gaokao reading and narrative continuation (续写).

  core: |
    **核心词汇精讲**

    ---

    **1. abandon** /əˈbændən/ v. 放弃; 抛弃 ⭐⭐⭐
    [G3·外研·选必3·U4]
    - abandon hope/a plan/an idea (放弃希望/计划/想法)
    - abandon a child/pet (遗弃)
    - with abandon (放纵地, 尽情地): dance with abandon

    辨析: abandon (完全放弃) vs give up (通用) vs quit (停止做某事)

    ---

    **2. astonish** /əˈstɒnɪʃ/ v. 使惊讶 ⭐⭐
    [G3·外研·选必3·U2]
    - astonish sb (使某人吃惊)
    - be astonished at/by sth (对某事感到吃惊)
    - astonishing (adj. 令人惊讶的) / astonished (adj. 感到惊讶的)

    辨析: astonish (强烈惊讶) > surprise (一般惊讶) > amaze (惊叹)

    ---

    **3. adopt** /əˈdɒpt/ v. 采纳; 收养 ⭐⭐⭐
    [G3·外研·选必3·U1]
    (复习 #37 G_FINAL 完形: adopt vs adapt vs adjust)
    - adopt a method/policy/approach (采纳)
    - adopt a child (收养)
    - adopted (adj. 收养的: adopted son)

    ---

    **4. advocate** /ˈædvəkeɪt/ v./n. 提倡; 倡导者 ⭐⭐⭐
    [G3·外研·选必3·U3]
    - advocate for sth (为某事倡导)
    - advocate doing sth (提倡做某事)
    - n. an advocate of/for (倡导者)

    ---

    **5. alter** /ˈɔːltə/ v. 改变; 修改 ⭐⭐
    [G3·外研·选必3·U4]
    - alter a plan/decision (改变计划/决定)
    - alter one's view (改变看法)
    辨析: alter (部分改变) vs change (全面改变) vs modify (微调)

  relations: |
    **续写必备情绪词网络**

    abandon (绝望放弃) → astonish (意外转折) → adopt (接受新方法) → advocate (主动推广) → alter (改变结果)

    这个"情绪弧线"是高考续写的标准模式: 困难→转折→行动→成功

  practice: |
    **场景: 环保故事完形** ⭐⭐⭐

    The villagers had almost ___(1)___ hope when they saw the polluted river. But a young teacher ___(2)___ for action. She ___(3)___ a new cleaning method that ___(4)___ everyone with its success. The experience ___(5)___ the way people thought about protecting nature.

    1. abandoned  2. advocated  3. adopted  4. astonished  5. altered

  summary: |
    **本节核心要点:**

    1. **abandon**: 完全放弃 (with abandon = 尽情地)
    2. **astonish**: 强烈惊讶 (-ing 令人 / -ed 感到)
    3. **adopt**: 采纳/收养 (≠adapt 适应 ≠adjust 微调)
    4. **advocate**: for sth / doing sth (提倡)
    5. **alter**: 部分改变 (≠change 全面)

