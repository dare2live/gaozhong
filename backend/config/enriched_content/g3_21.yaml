segments:
  hook: |
    **The Language of University**

    When you enter university, the language changes. Teachers no longer say "study hard" — they say "pursue academic excellence." They do not say "get information" — they say "access research databases." Reports must be "accurate," ideas must be "absorbed" deeply, and papers require "abstract" thinking.

    These five words are the gateway to academic English. They appear in nearly every university textbook, every research paper, and — most importantly — in the hardest reading passages on the gaokao.

  core: |
    **核心词汇精讲**

    ---

    **1. academic** /ˌækəˈdemɪk/ adj./n. 学术的; 学者 ⭐⭐⭐
    [G3·外研·选必3·U1]

    搭配: academic performance (学业表现) / academic research (学术研究) / academic year (学年)
    名词用法: She is a respected academic. (她是受尊敬的学者)

    ---

    **2. access** /ˈækses/ n./v. 进入; 获取 ⭐⭐⭐
    [G3·外研·选必3·U2]

    用法:
    - have access to sth (有权获取/使用某物) — 介词 to!
    - access information/the internet (获取信息/上网)
    - 形容词: accessible (可接近的/易理解的)

    例句:
    1. Students have free access to the library. ⭐
    2. Not everyone has equal access to quality education. ⭐⭐
    3. To produce accurate academic work, researchers must be able to access and absorb large amounts of information. ⭐⭐⭐

    超级易错: have access **to** (不是 have access of)

    ---

    **3. accurate** (复习 #11 #36): 准确的; accuracy (n.)

    ---

    **4. absorb** (复习 #35): 吸收/专注; be absorbed in; absorption (n.)

    ---

    **5. abstract** /ˈæbstrækt/ adj./n. 抽象的; 摘要 ⭐⭐⭐
    [G3·外研·选必3·U3]

    两义:
    - adj. abstract thinking/concept (抽象思维/概念) ↔ concrete (具体的)
    - n. paper abstract (论文摘要)

    例句:
    1. Math requires abstract thinking. ⭐
    2. The abstract of the paper gives a short summary of the research. ⭐⭐
    3. Academic writing demands the ability to move between abstract ideas and accurate, concrete evidence. ⭐⭐⭐

  relations: |
    **G3 词汇升级路径**

    G1 able → G2 achieve → **G3 academic** (学术场景)
    G1 accept → G2 approach → **G3 access** (获取知识)
    G2 accurate → **G3 absorb + abstract** (深度学习)

    这 5 个词构成"大学预备词汇", 高考 D 篇阅读高频出现.

  practice: |
    **场景 1: 大学介绍** ⭐⭐

    1. All students have ___ to the online library. (access/abstract/absorb)
    答案: access (have access to)

    2. The professor is a well-known ___ in this field. (academic/access/abstract)
    答案: academic (名词: 学者)

    3. She was completely ___ in the research. (accessed/absorbed/abstracted)
    答案: absorbed (be absorbed in = 全神贯注)

    **场景 2: 词形变化** ⭐⭐⭐

    4. The report must be ___ (accuracy) and well-written. → accurate (adj.)
    5. She has easy ___ (accessible) to the building. → access (n.)
    6. The ___ (absorb) of new knowledge takes time. → absorption (n.)

  summary: |
    **本节核心要点:**

    1. **academic**: 学术的/学者 (G3 核心高频)
    2. **access**: have access **to** (介词!); accessible
    3. **accurate**: 复习强化; accuracy (n.)
    4. **absorb**: 复习强化; be absorbed in; absorption
    5. **abstract**: 抽象的 (↔concrete) + 论文摘要

    **下节预告**: #22 情绪与转折 (abandon/astonish) — 续写必备的情绪词
