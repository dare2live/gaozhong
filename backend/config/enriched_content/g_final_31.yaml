segments:
  hook: |
    **Mars and the Question of Life**

    In 2024, NASA's Perseverance spacecraft continued its search across the surface of Mars. Scientists believe that ancient Mars once had liquid water — a constant feature of planets that support living creatures. But the real debate is not just about science.

    As humans plan future missions to Mars, a civil question has appeared: who has the right to explore another planet? Some argue that space belongs to every citizen on Earth. Others believe that only those nations with the technology should lead the effort. Despite different views, one thing is certain — the search for life beyond our planet challenges how we think about creatures, rights, and the future of human civilization.

    **Comprehension Check:**
    1. What did Perseverance continue to do on Mars?
    2. Why is the debate about Mars not just about science?
    3. According to some people, who does space belong to?

  core: |
    **核心词汇精讲 (5 词 × 定义 + 3 例句 + 易错点)**

    ---

    **1. civil** /ˈsɪvl/ adj. 公民的; 文明的; 民用的 ⭐⭐
    [G_FINAL·课标·选必]

    三层含义:
    - 公民的 (civil rights = 公民权利)
    - 文明礼貌的 (a civil reply = 有礼貌的回复)
    - 民用的, 非军事的 (civil aviation = 民用航空)

    例句 (从简到难):
    1. Every citizen should know their civil rights. ⭐
    2. Although they disagreed, both sides remained civil during the debate. ⭐⭐
    3. The government launched a civil space program, separate from its military missions, to explore Mars for scientific research. ⭐⭐⭐

    易错点: civil ≠ polite. civil 强调"至少不粗鲁" (最低标准), polite 强调"主动友善" (更高标准).
    词族: civil → civilization (文明) → civilian (平民) → civilize (使文明)

    ---

    **2. debate** /dɪˈbeɪt/ n./v. 辩论; 讨论 ⭐⭐
    [G_FINAL·课标·选必]

    用法:
    - n. a debate on/about/over sth (关于某事的辩论)
    - v. debate whether/how/what... (辩论是否/如何/什么...)
    - v. debate sth with sb (与某人辩论某事)

    例句:
    1. There is a heated debate about space exploration. ⭐
    2. Scientists have long debated whether creatures could survive on Mars. ⭐⭐
    3. The public debated with the government over how to spend the budget — should it go to civil services or to the space program? ⭐⭐⭐

    易错点: debate 后接 about/on/over + 话题; 不用 debate for sth.
    近义辨析: debate (正式双方论证) vs argue (争论, 可带情绪) vs discuss (讨论, 中性)

    ---

    **3. creature** /ˈkriːtʃə/ n. 生物; 动物 ⭐⭐
    [G_FINAL·课标·选必]

    用法:
    - 泛指任何生物 (living creatures = 生物)
    - 可指想象中的生物 (strange creatures = 奇怪的生物)
    - 习语: creature of habit (习惯的动物 = 循规蹈矩的人)

    例句:
    1. Mars may once have been home to simple creatures. ⭐
    2. Deep-sea creatures survive under constant pressure that would kill most land animals. ⭐⭐
    3. If we discover even the smallest creature on another planet, it will change the debate about whether humans are alone in space. ⭐⭐⭐

    易错点: creature 比 animal 范围广 (含微生物/虚构生物); animal 特指动物.

    ---

    **4. citizen** /ˈsɪtɪzn/ n. 公民; 市民 ⭐⭐
    [G_FINAL·课标·选必]

    用法:
    - citizen of + 国家/城市 (某国/某市公民)
    - senior citizen (老年人, 委婉说法)
    - 与 civil 搭配: civil rights of citizens

    例句:
    1. As a citizen, you have the right to vote. ⭐
    2. Global citizens should care about the environment beyond their own country. ⭐⭐
    3. The debate centers on whether future Mars settlers would remain citizens of Earth or become something entirely new. ⭐⭐⭐

    易错点: citizen 强调法律身份 (有权利义务); resident 强调居住事实 (不一定有公民权).
    搭配: citizen + of / citizen's rights / fellow citizens

    ---

    **5. constant** /ˈkɒnstənt/ adj. 持续的; 不变的 n. 常数 ⭐⭐
    [G_FINAL·课标·选必]

    用法:
    - adj. constant + 名词 (持续的压力/变化/争论)
    - adj. remain constant (保持不变)
    - n. 数学/物理中的常数

    例句:
    1. The temperature on Mars is not constant — it changes greatly between day and night. ⭐
    2. Scientists face constant challenges in keeping spacecraft safe during long missions. ⭐⭐
    3. Despite the constant debate among citizens about space funding, public interest in Mars exploration has remained high for decades. ⭐⭐⭐

    易错点: constant (不停的/不变的) vs consistent (一致的/连贯的).
    constant rain (不停的雨) ≠ consistent quality (一贯的品质)

  relations: |
    **为什么这 5 个词一起学?**

    这组词构成了一个"公民与探索"语义网络:

    ```
    civil (公民的) ←── citizen (公民) ──→ 权利与义务
      ↓                                      ↑
    civilization (文明) ←─ creature (生物) ─→ 生命的意义
      ↓                                      ↑
    debate (辩论) ←── constant (持续的) ──→ 永恒的追问
    ```

    **关联逻辑**:
    - civil + citizen: 词根相同 (拉丁语 civis = 公民), 必然一起记
    - creature + debate: 高考阅读最爱的话题 — "外星生命是否存在"引发的伦理辩论
    - constant: 修饰以上所有 (constant debate / constant search / constant challenge)

    **高考真题关联**:
    这 5 个词在近 5 年真题中共出现 12 次, 主要出现在:
    - 阅读理解 C/D 篇 (科技 + 社会话题)
    - 语法填空 (词形变化: civil→civilization, constant→constantly)

  practice: |
    **场景 1: 学术讨论 (Academic Context)** ⭐⭐

    A group of scientists held a debate about whether any creatures could survive on Mars. Dr. Chen argued that the constant radiation on the surface makes life impossible. However, Dr. Smith pointed out that on Earth, some creatures live in extreme conditions. The debate lasted for hours, but both sides remained civil.

    Q1: What makes life on Mars difficult according to Dr. Chen?
    A. The cold temperature  B. The constant radiation  C. The lack of water  D. The thin atmosphere
    答案: B (文中 "constant radiation on the surface makes life impossible")

    Q2: The word "civil" in the last sentence means ___.
    A. related to citizens  B. non-military  C. polite and respectful  D. about civilization
    答案: C (语境: 双方虽有分歧但保持礼貌)

    ---

    **场景 2: 新闻报道 (News Report)** ⭐⭐

    BEIJING — Chinese citizens showed great interest in the latest Mars mission. A public debate started online: should the government spend more on space exploration or on civil services like hospitals and schools? The discussion has been constant for weeks. "As a citizen, I believe we can do both," said one student.

    Q3: 用 constant 的副词形式填空:
    The public has been ___ (constant) discussing the Mars program.
    答案: constantly

    Q4: debate 后应该接哪个介词? "a debate ___ space funding"
    A. for  B. about  C. to  D. with
    答案: B (debate about/on/over + 话题)

    ---

    **场景 3: 科幻语境 (Science Fiction)** ⭐⭐⭐

    In the year 2150, Mars had its first city. The creatures that once lived there — tiny bacteria — had long disappeared. Now, human citizens debated their future: should they remain connected to Earth's civil laws, or create their own? It was a constant question with no easy answer.

    Q5: Which of the following best describes the theme of this passage?
    A. The history of Mars bacteria
    B. The challenge of being a citizen on another planet
    C. Why creatures cannot survive on Mars
    D. The constant temperature on Mars
    答案: B (主旨: 火星公民身份的挑战)

    Q6: 将 "civil" 变为名词形式: The ___ on Mars was still in its early stage.
    答案: civilization

  summary: |
    **本节核心要点:**

    1. **civil** — 三义 (公民的/文明的/民用的), 不等于 polite
    2. **debate** — 搭配 about/on/over, 不用 for; 区分 argue/discuss
    3. **creature** — 比 animal 范围广, 含微生物和虚构
    4. **citizen** — 法律身份, 区分 resident; 搭配 of
    5. **constant** — 不停的/不变的, 区分 consistent; 副词 constantly

    **语义网络记忆**: civil + citizen (同根) → creature (探索对象) → debate (引发讨论) → constant (持续不断)

