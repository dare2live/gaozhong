  practice: |
    **Practice: Tea Culture** ⭐⭐⭐

    Tea culture in China ___(1)___ (develop) for thousands of years. Today, tea ___(2)___ (consider) one of the most important drinks in Chinese life. Each type of tea requires a different ___(3)___ (prepare) method.

    To ___(4)___ (true) enjoy tea, one must ___(5)___ (patient) wait for it to brew. The temperature should be ___(6)___ (accurate) controlled. A tea master I met last year ___(7)___ (adjust) the water temperature several times during the process.

    1. has developed (现在完成: for thousands of years)
    2. is considered (被动: 茶被认为)
    3. preparation (名词: different + n.)
    4. truly (副词修饰动词 enjoy)
    5. patiently (副词修饰动词 wait)
    6. accurately (副词修饰动词 controlled)
    7. adjusted (一般过去: last year)

  summary: |
    **本节核心要点:**

    1. **时态三步**: 有主语?→主动被动?→什么时态?
    2. **词形变化**: 看前后词性需求 (adj→adv: -ly; n→adj: -ful/-less)
    3. **高频变形**: adjust→adjustment, accurate→accuracy→accurately

