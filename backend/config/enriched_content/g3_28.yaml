  hook: |
    **Grammar Fill: The 15-Point Gift**

    Grammar fill-in-the-blank is the most predictable section on the gaokao. Every year, the 10 blanks test the same types: verb tenses (3-4), word forms (3-4), and function words (2-3). If you know the patterns, you can score 12-15 out of 15.

    G_FINAL #38 covered the overall strategy. This G3 lesson goes deeper into the two hardest parts: tense choices and word form changes.

  core: |
    **时态 + 词形变化 深度讲解**

    ---

    **一、时态选择 (给动词原形, 要求变时态)** ⭐⭐⭐

    判断步骤:
    1. 有主语吗? → 有 = 谓语 (需时态); 无 = 非谓语 (doing/done/to do)
    2. 是主动还是被动? → 主语是执行者=主动; 主语是承受者=被动
    3. 什么时态? → 看时间标志词

    | 标志词 | 时态 |
    |---|---|
    | now/at present/look | 现在进行 |
    | yesterday/last year/ago | 一般过去 |
    | since/for/so far/already | 现在完成 |
    | by the time/before (过去) | 过去完成 |
    | next/tomorrow/will | 一般将来 |

    ---

    **二、词形变化 (给词根, 变形)** ⭐⭐⭐

    | 给什么 | 看什么 | 变什么 |
    |---|---|---|
    | 动词 | 前面有 be → 被动/进行 | done/doing |
    | 名词 | 前面有 many/these | 复数 -s |
    | 形容词 | 修饰动词 → 变副词 | -ly |
    | 形容词 | 有 than → 比较级 | -er / more |

    常考变形:
    - adjust → adjustment (n.) / adjustable (adj.)
    - accurate → accuracy (n.) / accurately (adv.) / inaccurate (反义)
    - abandon → abandoned (adj. 被遗弃的)

