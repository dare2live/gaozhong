  practice: |
    **模拟练习 — 时间管理训练**

    由于完整模拟卷需要 100 分钟, 本节课堂上做 mini 版 (30 分钟):

    **Part 1: 阅读 1 篇 (10 分钟)** — 使用 #35 或 #36 的 practice passage

    **Part 2: 完形 5 空 (5 分钟)** — 使用 #37 的 practice cloze 前 5 空

    **Part 3: 语法填空 5 空 (4 分钟)** — 使用 #38 的 practice 前 5 空

    **Part 4: 应用文 (10 分钟)** — 现场写一篇:

    题目: 假如你是李华, 学校英语角 (English Corner) 本周五活动主题是 "The Art of Cultural Heritage" (文化遗产). 请写信邀请留学生 Tom 参加.
    要点: (1) 时间地点 (周五下午 4 点, 学校图书馆) (2) 活动内容 (讨论故宫修复 + 分享各国文化遗产故事) (3) 表达期待

    **完成后自评**:
    - [ ] 格式正确 (Dear Tom / Yours, Li Hua)
    - [ ] 3 个要点全覆盖
    - [ ] 至少 2 个高级表达 (On behalf of... / It would be... / advocate...)
    - [ ] 80-100 词
    - [ ] 虚拟语气加分句 (I would appreciate it if you could...)

    **课后作业**: 完成 #35-#38 所有未做的 practice 题目 (计时, 记录用时)

  summary: |
