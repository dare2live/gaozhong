segments:
  hook: |
    **Final Countdown: One Paper, Four Skills**

    This is your last training session before the real exam. Today, we will simulate the written part of the gaokao English paper: Reading (4 passages), Cloze (1 passage), Grammar Fill (1 passage), and Writing (1 letter + 1 narrative continuation).

    The total time for the written section is 100 minutes. That means every minute counts. Here is your time budget:

    | Section | Questions | Target Time |
    |---|---|---|
    | Reading A-D | 15 questions | 35 minutes |
    | Cloze | 15 blanks | 15 minutes |
    | Grammar Fill | 10 blanks | 8 minutes |
    | Applied Writing | 1 letter, 80-100 words | 15 minutes |
    | Narrative Continuation | 1 essay, 150 words | 25 minutes |
    | Check | — | 2 minutes |

    Are you ready? Let's go.

  core: |
    **综合冲刺 — 四大板块策略复习**

    ---

    **一、阅读 (35 分钟 / 4 篇 / 30 分)** ⭐⭐⭐

    时间分配: A 篇 6 分钟 / B 篇 7 分钟 / C 篇 9 分钟 / D 篇 10 分钟 / 检查 3 分钟

    提分策略 (复习 #35 #36):
    - 先看题, 再看文 (带着问题读)
    - A 篇最简单, 不要花太多时间; D 篇最难, 留够时间
    - 推理题: 原文有依据才选, 不能靠常识猜

    ---

    **二、完形 (15 分钟 / 15 空 / 15 分)** ⭐⭐

    提分策略 (复习 #37):
    - 通读全文再填空 (不要逐空做)
    - 动词选择: 看主语 + 宾语
    - 形容词/副词选择: 看感情色彩 (正面/负面)
    - 不确定的先跳过, 做完回头用排除法

    ---

    **三、语法填空 (8 分钟 / 10 空 / 15 分)** ⭐⭐

    提分策略 (复习 #38):
    - 有提示词: 先判断"谓语 or 非谓语"
    - 无提示词: 四类 (冠词/介词/连词/代词)
    - 检查: 填完通读一遍, 看语法是否通顺

    ---

    **四、写作 (40 分钟 / 2 篇 / 40 分)** ⭐⭐⭐

    **应用文 (15 分 / 15 分钟)** — 复习 #39:
    - 格式正确 (Dear.../Yours...)
    - 3 个要点全覆盖
    - 2-3 个高级表达

    **读后续写 (25 分 / 25 分钟)**:
    这是新高考最大新增题型, 也是拉分最大的题.

    续写六步法:
    1. 读原文 (5 分钟): 理解人物 + 情节 + 情感走向
    2. 看两段首句: 第一段首句决定情节转折点; 第二段首句决定结局方向
    3. 列提纲 (2 分钟): 每段 3-4 个情节点
    4. 写作 (15 分钟): 每段 70-80 词
    5. 加分动作: 环境描写 + 心理描写 + 动作细节
    6. 检查 (3 分钟): 时态一致 + 人称一致 + 与原文风格一致

    **续写高分表达**:
    - 情绪: A wave of excitement swept over her. / His heart sank.
    - 动作: She reached out her trembling hand. / He took a deep breath.
    - 环境: The sun broke through the clouds. / Silence fell over the room.
    - 转折: It was at that moment that... / Little did he know...

    ---

    **核心词在综合卷中的出现方式**:

    - **academic**: 阅读 B 篇 (学校活动类) / 应用文 (学术交流邀请)
    - **advocate**: 完形 (人物观点: She advocated for...) / 应用文 (倡议类通知)
    - **affect**: 阅读 C/D 篇 (科技/社会影响) / 完形 (事件对人的影响)

