    2. **续写六步法**: 读原文 → 看首句 → 列提纲 → 写作 → 加分细节 → 检查
    3. **高频考词**: academic/advocate/affect 在 4 种题型中的不同考法
    4. **心态**: 先易后难, A 篇快做, D 篇留时间; 不确定先跳

