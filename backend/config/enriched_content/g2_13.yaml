segments:
  hook: |
    **Exam Season: The Pressure Is Real**

    It is May, and millions of students across China feel anxious about the upcoming exams. Schools announce special study plans. Parents argue about the best way to help. Teachers assume that more practice will lead to better results. But is that always true?

    A new approach to exam preparation is gaining attention: instead of studying more hours, students are learning to manage their emotions. Research shows that feeling less anxious can actually improve test scores by 10-15%.

    **Think about it:**
    1. Why do students feel anxious before exams?
    2. What new approach to preparation is mentioned?
    3. Do you think studying longer always leads to better results?

  core: |
    **核心词汇精讲**

    ---

    **1. anxious** /ˈæŋkʃəs/ adj. 焦虑的; 渴望的 ⭐⭐
    [G2·外研·必修3·U4]

    两义:
    - 焦虑的: be anxious about sth (为某事焦虑)
    - 渴望的: be anxious to do sth (渴望做某事) = eager

    例句:
    1. She felt anxious about the exam results. ⭐
    2. He is anxious to improve his English. ⭐⭐
    3. Although many students feel anxious, those who approach their studies with a clear plan and argue less with themselves tend to do better. ⭐⭐⭐

    词族: anxious → anxiety (n. 焦虑) → anxiously (adv.)
    辨析: anxious about (焦虑) vs anxious to do (渴望) — 同一个词两种情绪!

    ---

    **2. announce** /əˈnaʊns/ v. 宣布; 通知 ⭐⭐
    [G2·外研·必修3·U2]

    用法:
    - announce that... (宣布...)
    - announce sth to sb (向某人宣布)
    - It is announced that... (据宣布...)

    例句:
    1. The teacher announced the exam date. ⭐
    2. It was announced that the school would adopt a new approach to teaching. ⭐⭐
    3. When the principal announced the results, some students felt anxious while others argued that the test was too difficult. ⭐⭐⭐

    词族: announce → announcement (n.) → announcer (n. 播音员)

    ---

    **3. argue** /ˈɑːɡjuː/ v. 争论; 论证 ⭐⭐
    [G2·外研·必修3·U3]

    用法:
    - argue with sb about/over sth (与某人争论某事)
    - argue that... (论证说...)
    - argue for/against sth (支持/反对某观点)

    例句:
    1. They argued about which approach was better. ⭐
    2. Some scientists argue that stress can actually be helpful in small amounts. ⭐⭐
    3. While parents argue over the best study method, students who feel anxious should assume that asking for help is always a good first step. ⭐⭐⭐

    辨析: argue (论证, 可理性) vs quarrel (吵架, 带情绪) vs debate (正式辩论)

    ---

    **4. assume** /əˈsjuːm/ v. 假设; 承担 ⭐⭐
    [G2·外研·必修3·U4]

    用法:
    - assume (that)... (假设...)
    - It is assumed that... (人们假设...)
    - assume responsibility (承担责任)

    例句:
    1. I assumed he was a teacher, but he was actually a student. ⭐
    2. Don't assume that everyone learns at the same speed. ⭐⭐
    3. We should not assume that the traditional approach works for all students; instead, we should announce different options and let students choose. ⭐⭐⭐

    词族: assume → assumption (n. 假设)
    易错: assume (未经证实的假设) vs suppose (较随意的猜测) vs presume (有依据的推断)

    ---

    **5. approach** /əˈprəʊtʃ/ n./v. 方法; 接近 ⭐⭐⭐
    [G2·外研·必修3·U2]

    名词:
    - an approach to sth/doing (做某事的方法) — 注意 to 是介词!
    - a new/different approach (新/不同的方法)

    动词:
    - approach sb/sth (接近某人/某物)
    - approach a problem (着手处理问题)

    例句:
    1. We need a new approach to this problem. ⭐
    2. As the exam approaches, students feel more anxious. ⭐⭐
    3. The school announced a different approach to exam preparation: rather than assuming more study time helps, they argued for better study methods. ⭐⭐⭐

    超级易错: an approach **to** doing (to 是介词, 后面用 doing, 不是 to do!)
    辨析: approach (方法, 较抽象) vs method (具体方法) vs way (最通用)

  relations: |
    **G2 情感词汇网络**

    anxious (焦虑/渴望) → 触发 → argue (争论对策)
    assume (假设方案) → 选择 → approach (采用方法)
    announce (公布结果) → 循环

    **与 G1 的衔接**:
    G1 afraid (害怕) → G2 anxious (焦虑, 更高级)
    G1 accept (接受) → G2 assume (假设, 更学术)
    G1 action (行动) → G2 approach (方法, 更策略)

  practice: |
    **场景 1: 学校通知** ⭐⭐

    The school ___(1)___ that the final exam would take a new ___(2)___ this year. Some students felt ___(3)___ because they ___(4)___ the format would be different. Parents ___(5)___ about whether the change was good.

    1. announced  2. approach  3. anxious  4. assumed  5. argued

    **场景 2: approach to 搭配** ⭐⭐⭐

    6. Her approach ___ learning English is very effective. (to/for/of) → to
    7. He ___ (approach) the teacher after class and asked for advice. → approached
    8. It is wrong to ___ (assume) that all students learn the same way. → assume

  summary: |
    **本节核心要点:**

    1. **anxious**: about (焦虑) vs to do (渴望) — 同词两义!
    2. **announce**: 宣布; announcement (n.)
    3. **argue**: 论证/争论; argue with sb about sth; argue that
    4. **assume**: 假设 (未经证实); assumption (n.)
    5. **approach**: to + doing (to 是介词!); 名词"方法"+动词"接近"

