      - {id: "M", label: "男"}
    transcript: |
      W: The weather report says it will rain this afternoon. Should we still go hiking?
      M: Let's go to the museum instead. We can go hiking next weekend.
    stem: |
      What will they probably do this afternoon?
      A. Go hiking.
      B. Watch the weather report.
      C. Visit the museum.
    answer: "C"
    analysis: "男士建议去博物馆替代, 需听出 plan change."

  - id: "listening/short/004"
    section: A
    difficulty: mid
    audio_id: "2024/listening/short_04"
    audio_duration: 19
    speakers:
