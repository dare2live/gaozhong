# 听力练习库 — Phase 7.2
# 入库为 question_bank, question_type='听力短对话'/'听力长对话'/'听力独白'
# 每题: stem=题目+选项, answer=正确答案, transcript=听力原文
# 模仿新课标 II 卷 (辽宁) 结构, 原创内容 (非真题翻版)
#
# 词汇约束: 所有英文词 ⊆ 课标 3500 + 初中 1600 (G_FINAL layer)
# 语速: 正常偏慢 (~140 wpm), 适合高中生

version: "1.0"
updated: "2026-05-25"

# ================================================================
# Section A: 短对话 (5 段, 各 1 题) — 模拟 2024 新课标 II 卷风格
# ================================================================
short_dialogs:

  - id: "listening/short/001"
    section: A
    difficulty: mid
    audio_id: "2024/listening/short_01"
    audio_duration: 18
    speakers:
      - {id: "W", label: "女"}
      - {id: "M", label: "男"}
    transcript: |
      W: Excuse me, could you tell me where the nearest post office is?
      M: Sure. Go straight ahead and turn left at the second traffic light. You'll see it next to the bank.
    stem: |
      Where does the woman want to go?
      A. A bank.
      B. A post office.
      C. A traffic light.
    answer: "B"
    analysis: "女士问 nearest post office, 直接信息题."

  - id: "listening/short/002"
    section: A
    difficulty: mid
    audio_id: "2024/listening/short_02"
    audio_duration: 20
    speakers:
      - {id: "M", label: "男"}
      - {id: "W", label: "女"}
    transcript: |
      M: I heard you got a new job. Congratulations!
      W: Thanks! I'll be working at a children's hospital starting next Monday.
    stem: |
      Where will the woman work?
      A. At a school.
      B. At a children's hospital.
      C. At a research center.
    answer: "B"
    analysis: "children's hospital 直接出现在对话中."

  - id: "listening/short/003"
    section: A
    difficulty: mid
    audio_id: "2024/listening/short_03"
    audio_duration: 22
    speakers:
