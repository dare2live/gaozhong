# ================================================================
# Section B: 长对话 (2 段, 每段 3 题) — 信息量更大
# ================================================================
long_dialogs:

  - id: "listening/dialog/001"
    section: B
    difficulty: mid
    audio_id: "2024/listening/dialog_01"
    audio_duration: 65
    speakers:
      - {id: "W", label: "女 (学生)"}
      - {id: "M", label: "男 (老师)"}
    transcript: |
      W: Mr. Zhang, I'd like to join the school English speech contest. When is the sign-up deadline?
      M: The deadline is this Friday. But you'll need to prepare a three-minute speech on any topic related to the environment.
      W: The environment? That sounds interesting. Could I talk about ocean pollution?
      M: Of course. That's a great choice. The contest will be held in the school hall next Wednesday afternoon.
      W: I see. Is there anything else I should know?
      M: Yes, you should bring your own presentation slides. And remember, no reading from notes during the speech.
      W: Got it. Thank you, Mr. Zhang!
    questions:
      - stem: |
          What is the speech topic about?
          A. School life.
          B. The environment.
          C. Future careers.
        answer: "B"
        analysis: "topic related to the environment — 明确说明."
      - stem: |
          When will the contest be held?
          A. This Friday.
          B. Next Monday.
          C. Next Wednesday.
        answer: "C"
        analysis: "Friday 是报名截止, contest 是 next Wednesday."
      - stem: |
          What is NOT allowed during the speech?
          A. Using slides.
          B. Reading from notes.
          C. Choosing your own topic.
        answer: "B"
        analysis: "no reading from notes — 否定细节题."

  - id: "listening/dialog/002"
    section: B
    difficulty: mid
    audio_id: "2024/listening/dialog_02"
    audio_duration: 72
    speakers:
      - {id: "M", label: "男 (李华)"}
      - {id: "W", label: "女 (Sarah)"}
    transcript: |
      M: Hi Sarah, I noticed you've been reading a lot of books about space recently.
      W: Yes! I just finished one about the Mars exploration program. It was really exciting.
      M: That sounds cool. What interested you the most?
      W: Well, scientists are trying to grow plants on Mars. They've already done experiments on the International Space Station.
      M: Really? Why would they want to grow plants there?
      W: Because if humans ever live on Mars, they'll need fresh food. They can't bring everything from Earth.
      M: That makes sense. Do you think we'll actually go to Mars one day?
      W: I believe so. Maybe not in the next ten years, but definitely within our lifetime.
    questions:
      - stem: |
          What book did Sarah just finish?
          A. A book about the space station.
          B. A book about Mars exploration.
          C. A book about growing food.
        answer: "B"
        analysis: "Mars exploration program 是书的主题."
      - stem: |
          Why do scientists want to grow plants on Mars?
          A. To do scientific experiments.
          B. To make Mars look like Earth.
          C. To provide fresh food for humans.
        answer: "C"
        analysis: "they'll need fresh food — 原因推理."
      - stem: |
          What does Sarah think about going to Mars?
          A. It will happen within their lifetime.
          B. It will happen in the next ten years.
          C. It will never happen.
        answer: "A"
        analysis: "not in ten years, but within our lifetime — 时间判断."

# ================================================================
# Section B: 独白 (2 段, 每段 3 题) — 信息密度高
# ================================================================
monologues:

  - id: "listening/passage/001"
    section: B
    difficulty: hard
    audio_id: "2024/listening/passage_01"
    audio_duration: 85
    speakers:
      - {id: "N", label: "旁白"}
    transcript: |
      Good morning, everyone. Welcome to the Shenyang Science Museum. Before we start the tour, let me give you some important information.

      The museum has three floors. The first floor is about natural history, where you can see fossils and models of animals that lived millions of years ago. The second floor is our technology section, with hands-on experiments you can try. The third floor has a special exhibition this month about Chinese space exploration, including a model of the Tiangong space station.

      The tour will last about two hours. We'll start from the first floor and work our way up. Please stay with the group and don't touch the exhibits unless there's a sign that says you can. There's a gift shop on the first floor near the exit.

      If you have any questions during the tour, please don't hesitate to ask. Now, let's begin!
    questions:
      - stem: |
          What is on the second floor?
          A. Natural history.
          B. Technology experiments.
          C. Space exploration.
        answer: "B"
        analysis: "second floor = technology section with hands-on experiments."
      - stem: |
          What special exhibition is showing this month?
          A. Ancient fossils.
          B. Chinese space exploration.
          C. Modern technology.
        answer: "B"
        analysis: "third floor special exhibition = Chinese space exploration."
      - stem: |
          How long will the tour last?
          A. About one hour.
          B. About two hours.
          C. About three hours.
        answer: "B"
        analysis: "about two hours — 直接信息."

  - id: "listening/passage/002"
    section: B
    difficulty: hard
    audio_id: "2024/listening/passage_02"
    audio_duration: 90
    speakers:
      - {id: "N", label: "旁白"}
    transcript: |
      Do you know that reading before bed can improve your sleep quality? A recent study from a British university found that reading for just six minutes can reduce stress levels by up to 68 percent. That's more effective than listening to music or going for a walk.

      The researchers tested different relaxation methods. They measured heart rate and muscle tension in volunteers. Reading came out on top because it requires concentration, which distracts the mind from daily worries.

      However, the study also warns that reading on a phone or tablet screen before bed may actually harm your sleep. The blue light from screens can reduce the production of melatonin, a hormone that helps you fall asleep. So experts suggest reading a paper book instead.

      If you find it hard to fall asleep at night, try picking up a book. Start with just ten minutes a night, and you may notice a difference within a week.
    questions:
      - stem: |
          How much can reading reduce stress according to the study?
          A. Up to 50 percent.
          B. Up to 68 percent.
          C. Up to 80 percent.
        answer: "B"
        analysis: "68 percent — 数字细节."
      - stem: |
          Why is reading effective for relaxation?
          A. It makes people tired.
          B. It requires concentration.
          C. It is similar to music.
        answer: "B"
        analysis: "requires concentration → distracts from worries."
      - stem: |
          What do experts suggest for bedtime reading?
          A. Reading on a phone.
          B. Reading a paper book.
          C. Listening to an audiobook.
        answer: "B"
        analysis: "paper book 替代 screen — 蓝光影响."

