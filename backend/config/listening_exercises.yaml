    audio_duration: 78
    speakers:
      - {id: "W", label: "女 (图书管理员)"}
      - {id: "M", label: "男 (学生)"}
    transcript: |
      M: Good afternoon. I'd like to borrow some books about Chinese history for my research paper.
      W: Of course. What period are you focusing on?
      M: The Tang Dynasty. My teacher said we should find at least three different sources.
      W: Let me check our system. We have five books on the Tang Dynasty in stock. Two are about the economy, two about art and culture, and one about daily life.
      M: I think I'll take the ones about art and culture, and the one about daily life.
      W: Good choice. You can borrow them for three weeks. Just remember to return them before the due date, or there will be a small fine.
      M: How much is the fine?
      W: It's one yuan per day per book. But you can renew online if you need more time.
    questions:
      - stem: |
          How many books on the Tang Dynasty does the library have?
          A. Three.
          B. Five.
          C. Seven.
        answer: "B"
        analysis: "five books in stock — 数字细节."
      - stem: |
          Which books will the man borrow?
          A. About the economy and daily life.
          B. About art, culture, and daily life.
          C. All five books.
        answer: "B"
        analysis: "art and culture (2 本) + daily life (1 本)."
      - stem: |
          What happens if books are returned late?
          A. The student gets a warning.
          B. There is a fine of one yuan per day per book.
          C. The student cannot borrow again.
        answer: "B"
        analysis: "one yuan per day per book — 直接信息."

