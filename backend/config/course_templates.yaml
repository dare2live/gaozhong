# 40 节课程编排 — 4 层 × 10
# 用户 2026-05-24 D2/D6: 30 节×2h → 改 40 节 (4 层 × 10); 总冲刺=G_FINAL 10 节
# 板块按 5.4.D 差异化: G1 重词 / G2 加完形 + 应用文 / G3 加续写 + 语法填空 / G_FINAL 加模拟卷
#
# 词均从 cefr_vocab 实抽 (R5 strict ⊆ layer 词集)
# grammar 用真实 grammar_items_id (R6 必标)
# 主题从 theme_pool 抽 (R3 ≥3, R2 不重叠教材, D5 非政治)

