# 教学内容生成原则 (Phase 7.1)
# 本文件是 40 节讲义内容的生成约束, 任何重新生成都必须遵守.
# 前端 B tab 讲义页底部显示关键约束摘要.
# 数据库 course_handouts.meta_json 存储本文件 hash + 生成时间.

version: "1.0"
updated: "2026-05-25"

# ============ 铁律约束 (不可违反) ============
constraints:
  R2_no_textbook_copy:
    description: "10-gram 不与教材原文重叠"
    enforcement: "audit_course_no_textbook_copy 自动校验"
    technique: "用自己的语言重述, 不引用教材原句超过 9 个连续词"

  R5_lexical_layer:
    description: "所有英语词 ⊆ 对应年级词汇层"
    enforcement: "audit_course_lexical_layer 自动校验"
    layers:
      G1: "小学+初中+外研必修1-2+人教必修1-2 (~1200 词)"
      G2: "G1 + 外研必修3+选必1-2 + 人教必修3+选必1-2 (~2200 词)"
      G3: "G2 + 外研选必3-4 + 人教选必3-4 (~3000 词)"
      G_FINAL: "G3 + 课标 3500 全集 (~3500 词)"
    technique: "生成前获取词表白名单, 检查每个英语词是否在白名单内"

  R1_relations:
    description: "每节核心知识点 ≥3 个关联"
    enforcement: "audit_course_relations 自动校验"

  R4_homework:
    description: "作业 tag 100% ⊆ 本节知识点"
    enforcement: "audit_homework_alignment 自动校验"

  D0_accuracy:
    description: "任何数据+关联 100% 准确"
    enforcement: "scripts/data_accuracy_check.py 18 章全绿"

  no_political:
    description: "不含政治敏感词"
    enforcement: "audit_no_political + political_blacklist.yaml"

# ============ 内容设计原则 (高质量指南) ============
design_principles:
  hook_segment:
    purpose: "3-5 分钟导入, 激发兴趣"
    format: "150-200 词英文短文 (Time/NatGeo/SciAm 风格)"
    requirements:
      - "紧扣本节主题 (themes_main)"
      - "用词严格 ⊆ lexical_layer"
      - "末尾 2-3 个 comprehension questions"
      - "不虚构数据 (年份/数字/地名要真实或明确为 fiction)"

  core_teaching:
    purpose: "25 分钟核心讲解"
    format: "500-800 词混合中英 (讲解中文, 例句英文)"
    requirements:
      - "每个核心词/语法点: 定义 + 3 例句 + 1 易错点"
      - "例句从简到难 (短句→复合句→语篇)"
      - "标注教材位置 [外研·选必3·U2·Vocabulary]"
      - "对比近义词/易混淆项"
    anti_patterns:
      - "不列词典释义后就结束 (要有语境)"
      - "不只给中文翻译 (要有用法说明)"

  relations_segment:
    purpose: "10 分钟拓展联想"
    format: "200-300 词"
    requirements:
      - "解释为什么这些词/语法一起学 (语义网络)"
      - "词族 (civil → civilization → civilian)"
      - "搭配 (debate + on/about/over)"
      - "近义辨析 (creature vs animal vs being)"

  practice_segment:
    purpose: "20 分钟场景练习"
    format: "3 个 mini-scenario, 各 80-100 词 + 2 题"
    requirements:
      - "3 个不同语境 (学术/日常/新闻)"
      - "题目类型多样 (选择/填空/改错)"
      - "答案唯一且有解析"
    scenarios_source: "theme_pool.yaml 50 主题"

  summary_segment:
    purpose: "5 分钟收束"
    format: "100-150 词"
    requirements:
      - "列本节 3-5 个核心要点"
      - "预告下节内容 (衔接)"

# ============ 格式规范 ============
format:
  concept_links: "核心词/语法用 <a class='gz-concept' data-concept='xxx'>label</a>"
  textbook_position: "标注格式 [版本·册·单元·板块]"
  difficulty_markers:
    basic: "⭐"
    intermediate: "⭐⭐"
    advanced: "⭐⭐⭐"
  section_separators: "用 --- 分隔 7 段"

# ============ 质量检查清单 (生成后必检) ============
quality_checklist:
  - "总字符数 ≥ 5000"
  - "英语词全在 lexical_layer 内"
  - "10-gram 不与 section_text 重叠"
  - "3 例句/核心词 (不少于)"
  - "3 场景/节 (不少于)"
  - "无政治敏感词"
  - "年份/数据真实或标注 fictional"
  - "concept link 格式正确"
